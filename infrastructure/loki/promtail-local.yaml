# Ships Envoy file access logs (JSON lines) to local Loki.
server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/tarka-promtail-positions.yaml

clients:
  - url: http://127.0.0.1:3100/loki/api/v1/push
    timeout: 10s

scrape_configs:
  - job_name: envoy_access_file
    static_configs:
      - targets:
          - localhost
        labels:
          job: tarka
          service: envoy
          component: access
          __path__: /tmp/tarka-envoy-access.ndjson
