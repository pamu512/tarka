# Minimal single-process Loki for local development (works across common Loki versions).
# Files live under /tmp (development only).
auth_enabled: false

server:
  http_listen_address: 127.0.0.1
  http_listen_port: 3100
  grpc_listen_address: 127.0.0.1
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /tmp/tarka-loki
  storage:
    filesystem:
      chunks_directory: /tmp/tarka-loki/chunks
      rules_directory: /tmp/tarka-loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

storage_config:
  boltdb_shipper:
    active_index_directory: /tmp/tarka-loki/boltdb-shipper-active
    cache_location: /tmp/tarka-loki/boltdb-shipper-cache
    cache_throughput_mb: 10
    shared_store: filesystem
  filesystem:
    directory: /tmp/tarka-loki/chunks

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32

compactor:
  working_directory: /tmp/tarka-loki/compactor

ingester:
  lifecycler:
    ring:
      kvstore:
        store: inmemory
