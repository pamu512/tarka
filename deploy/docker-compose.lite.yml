# Tarka Lite — "try it in 5 minutes" deployment
# Only the essential services: postgres, redis, decision-api, case-api, frontend.
# No Neo4j, NATS, ClickHouse, or OPA.
#
# Usage:
#   docker compose -f deploy/docker-compose.lite.yml up --build

name: tarka-lite

services:
  # ---------- Infrastructure ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud
    ports:
      - "5432:5432"
    volumes:
      - fraud_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ---------- Core Services ----------
  decision-api:
    build:
      context: ..
      dockerfile: services/decision-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
      REDIS_URL: redis://redis:6379/0
      RULES_PATH: /app/rules
      FEATURE_SERVICE_URL: ""
      ML_SCORING_URL: ""
      GRAPH_SERVICE_URL: ""
      OPA_URL: ""
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  case-api:
    build:
      context: ..
      dockerfile: services/case-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
      GRAPH_SERVICE_URL: ""
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - decision-api
      - case-api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  fraud_pg:
