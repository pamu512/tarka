# Tarka Lite — "try it in 5 minutes" deployment
# Core: postgres, redis, decision-api, case-api, integration-ingress, frontend.
# Optional OSS path: Neo4j + graph-service + feature-service + ml-scoring (profiles: graph, ml)
# so policy routing, typologies, velocities, and graph checkpoints work without the full stack.
#
# Usage:
#   docker compose -f deploy/docker-compose.lite.yml up --build

name: tarka-lite

services:
  # ---------- Infrastructure ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud
    ports:
      - "5432:5432"
    volumes:
      - fraud_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/tarka2026
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - fraud_neo4j_lite:/data
    profiles: [graph]

  # ---------- Core Services ----------
  decision-api:
    build:
      context: ..
      dockerfile: services/decision-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
      REDIS_URL: redis://redis:6379/0
      RULES_PATH: /app/rules
      FEATURE_SERVICE_URL: ${FEATURE_SERVICE_URL:-}
      ML_SCORING_URL: ${ML_SCORING_URL:-}
      GRAPH_SERVICE_URL: ${GRAPH_SERVICE_URL:-}
      OPA_URL: ""
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  graph-service:
    build:
      context: ..
      dockerfile: services/graph-service/Dockerfile
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: tarka2026
    ports:
      - "8001:8001"
    depends_on:
      - neo4j
    profiles: [graph]

  feature-service:
    build:
      context: ..
      dockerfile: services/feature-service/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      FEATURE_SERVICE_REDIS_URL: redis://redis:6379/0
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_healthy
    profiles: [ml]

  ml-scoring:
    build:
      context: ..
      dockerfile: services/ml-scoring/Dockerfile
    environment:
      DISABLE_ML: ${DISABLE_ML:-false}
    ports:
      - "8005:8005"
    profiles: [ml]

  case-api:
    build:
      context: ..
      dockerfile: services/case-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
      GRAPH_SERVICE_URL: ${GRAPH_SERVICE_URL:-}
      DECISION_API_URL: http://decision-api:8000
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  integration-ingress:
    build:
      context: ..
      dockerfile: services/integration-ingress/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
      KMS_PROVIDER: local
      KMS_ACTIVE_KEY_ID: lite-v1
      INTEGRATION_VAULT_KEY: lite-dev-key
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - decision-api
      - case-api
      - integration-ingress
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  fraud_pg:
  fraud_neo4j_lite:
