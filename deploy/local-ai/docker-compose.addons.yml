services:
  frontend:
    ports:
      - "${AGENTIC_FRONTEND_PORT:-3010}:3000"
    environment:
      - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-http://localhost:7777}

  backend:
    ports:
      - "${AGENTIC_BACKEND_PORT:-7777}:${AGENTIC_BACKEND_PORT:-7777}"
    environment:
      - BACKEND_PORT=${AGENTIC_BACKEND_PORT:-7777}
      - DOCKER_INTERNAL_URL=http://host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"

  searxng:
    ports:
      - "${SEARXNG_PORT:-8080}:8080"
    environment:
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET_KEY}

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - "${OPEN_WEBUI_PORT:-3001}:8080"
    environment:
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - open-webui-data:/app/backend/data
    networks:
      - agentic-seek-net
    profiles: ["addons", "full"]

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:${N8N_PORT:-5678}/
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - agentic-seek-net
    profiles: ["addons", "full"]

volumes:
  open-webui-data:
  n8n-data:
