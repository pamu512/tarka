# Recording rules: HTTP 5xx ratio (5m vs 1h windows) by service label from shared observability middleware.
# http_requests_total includes optional tenant_query=present|absent; sums by service are unchanged.
# Load via prometheus.yml rule_files. Tune alert thresholds for your error budget.

groups:
  - name: tarka_slo_http_burn
    interval: 30s
    rules:
      - record: tarka:http_5xx_ratio_5m
        expr: |
          sum by (service) (rate(http_requests_total{status=~"5.."}[5m]))
          /
          clamp_min(sum by (service) (rate(http_requests_total[5m])), 1e-9)
      - record: tarka:http_5xx_ratio_1h
        expr: |
          sum by (service) (rate(http_requests_total{status=~"5.."}[1h]))
          /
          clamp_min(sum by (service) (rate(http_requests_total[1h])), 1e-9)

  - name: tarka_slo_alerts
    rules:
      # Example: multi-window burn — both windows hot (adjust ratio to your SLO).
      - alert: TarkaHighErrorRate5m
        expr: tarka:http_5xx_ratio_5m > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Elevated 5xx ratio (5m) for {{ $labels.service }}"
      - alert: TarkaHighErrorRate1h
        expr: tarka:http_5xx_ratio_1h > 0.01
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "Sustained 5xx ratio (1h) for {{ $labels.service }}"

      - alert: TarkaRiskServiceHighErrorRate5m
        expr: tarka:http_5xx_ratio_5m{service=~"calibration-service|counter-service|location-service"} > 0.03
        for: 5m
        labels:
          severity: warning
          tier: risk-services
        annotations:
          summary: "Risk service 5xx ratio elevated (5m): {{ $labels.service }}"
          description: "Error ratio exceeded 3% in the last 5m for a first-class risk service."

      - alert: TarkaRiskServiceHighErrorRate1h
        expr: tarka:http_5xx_ratio_1h{service=~"calibration-service|counter-service|location-service"} > 0.01
        for: 15m
        labels:
          severity: warning
          tier: risk-services
        annotations:
          summary: "Risk service 5xx ratio sustained (1h): {{ $labels.service }}"
          description: "Error ratio exceeded 1% in the last 1h for a first-class risk service."

      - alert: TarkaDecisionApiCircuitOpenCalibration
        expr: rate(tarka_circuit_open_total_calibration[5m]) > 0.01
        for: 10m
        labels:
          severity: warning
          tier: decision-resilience
        annotations:
          summary: "Decision API calibration circuit is opening frequently"
          description: "Calibration dependency is degraded; inspect fallback_reason and upstream latency."

      - alert: TarkaDecisionApiCircuitOpenCounter
        expr: rate(tarka_circuit_open_total_counter[5m]) > 0.01
        for: 10m
        labels:
          severity: warning
          tier: decision-resilience
        annotations:
          summary: "Decision API counter circuit is opening frequently"
          description: "Counter-service fallback path is active; verify local aggregate fallback and upstream health."

      - alert: TarkaDecisionApiCircuitOpenLocation
        expr: rate(tarka_circuit_open_total_location[5m]) > 0.01
        for: 10m
        labels:
          severity: warning
          tier: decision-resilience
        annotations:
          summary: "Decision API location circuit is opening frequently"
          description: "Location dependency is degraded; evaluate geo risk fallback quality."

      - alert: TarkaDecisionApiCircuitOpenExternal
        expr: rate(tarka_circuit_open_total_external[5m]) > 0.01
        for: 10m
        labels:
          severity: warning
          tier: decision-resilience
        annotations:
          summary: "Decision API external signal circuit is opening frequently"
          description: "External connector path is degraded; inspect provider outages and timeout budget."
