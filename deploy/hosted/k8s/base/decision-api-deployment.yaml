apiVersion: apps/v1
kind: Deployment
metadata:
  name: decision-api
  labels:
    app: decision-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: decision-api
  template:
    metadata:
      labels:
        app: decision-api
    spec:
      containers:
        - name: decision-api
          image: ghcr.io/pamu512/tarka-decision-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: tarka-secrets
                  key: api-keys
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tarka-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: tarka-secrets
                  key: redis-url
