apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: tarka-prod
resources:
  - ../../base
patches:
  - target:
      kind: Deployment
      name: decision-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 4
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: ghcr.io/pamu512/tarka-decision-api:prod
