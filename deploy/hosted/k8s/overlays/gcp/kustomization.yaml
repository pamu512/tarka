apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../prod
patches:
  - target:
      kind: Deployment
      name: decision-api
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: TARKA_CLOUD_PROVIDER
          value: gcp
