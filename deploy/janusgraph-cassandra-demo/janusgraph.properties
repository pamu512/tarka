# JanusGraph local demo — Cassandra CQL storage + DB cache for fast UI traversals
# Mount: /etc/opt/janusgraph/janusgraph.properties (read-only recommended once verified)
#
# Related: deploy/janusgraph-cassandra-demo/docker-compose.yml (JVM heaps, Cassandra MAX_HEAP_SIZE)

gremlin.graph = org.janusgraph.core.JanusGraphFactory

# --- Storage: Apache Cassandra via CQL ---
storage.backend=cql
storage.hostname = cassandra
storage.cql.keyspace = janusgraph
storage.cql.local-datacenter = datacenter1
storage.cql.replication-strategy-class = SimpleStrategy
storage.cql.replication-factor = 1

# --- Database cache (hot graph elements; speeds repeated Gremlin for dashboards/UI) ---
# Absolute size in bytes per JanusGraph config reference (values > 1 are bytes).
# 500 MiB = 500 * 1024 * 1024
cache.db-cache = true
cache.db-cache-size = 524288000
cache.db-cache-clean-wait = 20
cache.db-cache-time = 180000

# --- IDs (sensible defaults for single-node demo) ---
ids.authority.enabled = true
ids.authority.conflict-avoidance-mode = strong
ids.block-size = 256

# --- Mixed index backend (required for most JanusGraph deployments; local Lucene, no ES) ---
index.search.backend = lucene
index.search.directory = /var/lib/janusgraph/index
