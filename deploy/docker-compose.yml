# Tarka — modular profiles (combine as needed):
#   docker compose --profile core up -d
#   docker compose --profile core --profile graph --profile ml up -d
# Full stack:
#   docker compose --profile full up -d
# CI: GitHub Actions job `stack-smoke` runs scripts/ci/full_stack_smoke.py (health + evaluate smoke).

name: tarka

services:
  # ---------- Infrastructure ----------
  postgres:
    image: apache/age:release_PG16_1.6.0
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud
    ports:
      - "5432:5432"
    volumes:
      - fraud_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: [core, full, graph]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles: [core, full]

  nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - fraud_nats:/data
    profiles: [streaming, full]

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - fraud_ch:/var/lib/clickhouse
    profiles: [analytics, full]

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.120.1
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
      - "13133:13133" # health_check
    depends_on:
      - clickhouse
    profiles: [analytics, full]

  opa:
    image: openpolicyagent/opa:0.70.0
    command: ["run", "--server", "/policies/policy.rego"]
    volumes:
      - ./opa:/policies:ro
    ports:
      - "8181:8181"
    profiles: [opa, full]

  triton:
    image: nvcr.io/nvidia/tritonserver:23.12-py3
    command: ["tritonserver", "--model-repository=/models", "--http-port=8020", "--grpc-port=8021", "--metrics-port=8022"]
    volumes:
      - ./model_repository:/models
    ports:
      - "8020:8020" # HTTP
      - "8021:8021" # GRPC
      - "8022:8022" # Metrics
    profiles: [ml, full]

  # ---------- Core Services ----------
  core-api:
    build:
      # Compose file lives in deploy/: parent directory is the git repo root.
      # Required so services/core-api/Dockerfile can COPY services/core, services/analytics, …
      context: ..
      dockerfile: services/core-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
      REDIS_URL: redis://redis:6379/0
      RULES_PATH: /app/rules
      FEATURE_SERVICE_URL: ${FEATURE_SERVICE_URL:-http://signal-api:8004/features}
      ML_SCORING_URL: ${ML_SCORING_URL:-http://signal-api:8004/ml}
      GRAPH_SERVICE_URL: ${GRAPH_SERVICE_URL:-}
      CALIBRATION_SERVICE_URL: ${CALIBRATION_SERVICE_URL:-http://signal-api:8004/calibration}
      COUNTER_SERVICE_URL: ${COUNTER_SERVICE_URL:-http://signal-api:8004/counters}
      LOCATION_SERVICE_URL: ${LOCATION_SERVICE_URL:-http://signal-api:8004/location}
      OPA_URL: ${OPA_URL:-}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-1000}
      RATE_LIMIT_BURST: ${RATE_LIMIT_BURST:-60}
      UVICORN_WORKERS: ${UVICORN_WORKERS:-1}
      ALLOW_INSECURE_NO_AUTH: ${ALLOW_INSECURE_NO_AUTH:-false}
      API_KEYS: ${API_KEYS:-}
      TENANT_BINDING_REQUIRED: ${TENANT_BINDING_REQUIRED:-false}
      API_KEY_TENANT_MAP: ${API_KEY_TENANT_MAP:-}
      EDGE_SECURITY_SIGNALS_ENABLED: ${EDGE_SECURITY_SIGNALS_ENABLED:-false}
      EDGE_WAF_ACTION_HEADER: ${EDGE_WAF_ACTION_HEADER:-x-waf-action}
      EDGE_BOT_SCORE_HEADER: ${EDGE_BOT_SCORE_HEADER:-x-bot-score}
      EDGE_BOT_SCORE_BLOCK_THRESHOLD: ${EDGE_BOT_SCORE_BLOCK_THRESHOLD:-25}
      EDGE_BOT_SCORE_REVIEW_THRESHOLD: ${EDGE_BOT_SCORE_REVIEW_THRESHOLD:-50}
      DECISION_API_URL: http://127.0.0.1:8000/decisions
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      signal-api:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/decisions/v1/ready')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    profiles: [core, full]

  graph-service:
    build:
      context: ..
      dockerfile: services/graph-service/Dockerfile
    environment:
      GRAPH_BACKEND: age
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
      TENANT_BINDING_REQUIRED: ${TENANT_BINDING_REQUIRED:-false}
      API_KEY_TENANT_MAP: ${API_KEY_TENANT_MAP:-}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [graph, full]

  integration-ingress:
    build:
      context: ..
      dockerfile: services/integration-ingress/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
      TENANT_BINDING_REQUIRED: ${TENANT_BINDING_REQUIRED:-false}
      API_KEY_TENANT_MAP: ${API_KEY_TENANT_MAP:-}
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [integration, full]

  signal-api:
    build:
      context: ..
      dockerfile: services/signal-api/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      FEATURE_SERVICE_REDIS_URL: redis://redis:6379/0
      COUNTER_SERVICE_REDIS_URL: redis://redis:6379/0
      DISABLE_ML: ${DISABLE_ML:-false}
      TRITON_URL: ${TRITON_URL:-http://triton:8020}
      TRITON_MODEL_INPUT: ${TRITON_MODEL_INPUT:-X}
      TRITON_MODEL_OUTPUT: ${TRITON_MODEL_OUTPUT:-probabilities}
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_started
    profiles: [core, ml, full, ui, risk]

  investigation-agent:
    build:
      context: ..
      dockerfile: services/investigation-agent/Dockerfile
    environment:
      CASE_API_URL: http://core-api:8000/cases
      GRAPH_SERVICE_URL: http://graph-service:8001
      DECISION_API_URL: http://core-api:8000/decisions
      ALLOWED_ANALYSTS: ${ALLOWED_ANALYSTS:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_PROVIDER_FALLBACKS: ${LLM_PROVIDER_FALLBACKS:-anthropic,gemini,ollama}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      AI_GOVERNANCE_PROFILE: ${AI_GOVERNANCE_PROFILE:-global}
      BATCH_TTL_SECONDS: ${BATCH_TTL_SECONDS:-7200}
      COPILOT_INJECTION_POLICY: ${COPILOT_INJECTION_POLICY:-reject}
      COPILOT_TRUSTED_SCOPE_HEADERS_REQUIRED: ${COPILOT_TRUSTED_SCOPE_HEADERS_REQUIRED:-false}
      API_KEYS: ${API_KEYS:-}
    ports:
      - "8006:8006"
    depends_on:
      - core-api
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/v1/ready')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    profiles: [agent, full, ui]

  # ---------- New Services ----------
  # Consolidated ingest (:8007) + ClickHouse analytics query/sink (same port, single process).
  data-plane:
    build:
      context: ..
      dockerfile: services/data-plane/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      DECISION_API_URL: http://core-api:8000/decisions
      REDIS_URL: redis://redis:6379/0
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY:-}
      INGEST_SCHEMA_REGISTRY_MODE: ${INGEST_SCHEMA_REGISTRY_MODE:-enforce}
      API_KEYS: ${API_KEYS:-}
      ALLOW_INSECURE_NO_AUTH: ${ALLOW_INSECURE_NO_AUTH:-false}
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_DATABASE: fraud
      DECISIONS_STREAM_NAME: FRAUD_DECISIONS
      DECISIONS_SUBJECT_PATTERN: fraud.decisions.>
      TENANT_BINDING_REQUIRED: ${TENANT_BINDING_REQUIRED:-false}
      API_KEY_TENANT_MAP: ${API_KEY_TENANT_MAP:-}
    ports:
      - "8007:8007"
    depends_on:
      - nats
      - core-api
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8007/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s
    profiles: [streaming, analytics, full]

  graphql-gateway:
    build:
      context: ..
      dockerfile: services/graphql-gateway/Dockerfile
    environment:
      DECISION_API_URL: http://core-api:8000/decisions
      CASE_API_URL: http://core-api:8000/cases
      GRAPH_SERVICE_URL: http://graph-service:8001
    ports:
      - "8010:8010"
    depends_on:
      - core-api
    profiles: [gateway, full]

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_AI_GOVERNANCE_PROFILE: ${VITE_AI_GOVERNANCE_PROFILE:-global}
    ports:
      - "3000:80"
    depends_on:
      - core-api
      - investigation-agent
      - signal-api
    profiles: [ui, full]

volumes:
  fraud_pg:
  fraud_nats:
  fraud_ch:
