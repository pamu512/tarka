# Tarka — modular profiles (combine as needed):
#   docker compose --profile core up -d
#   docker compose --profile core --profile graph --profile ml --profile cases up -d
# Full stack:
#   docker compose --profile full up -d
# CI: GitHub Actions job `stack-smoke` runs scripts/ci/full_stack_smoke.py (health + evaluate smoke).

name: tarka

services:
  # ---------- Infrastructure ----------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fraud
      POSTGRES_PASSWORD: fraud
      POSTGRES_DB: fraud
    ports:
      - "5432:5432"
    volumes:
      - fraud_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraud -d fraud"]
      interval: 5s
      timeout: 5s
      retries: 10
    profiles: [core, full]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    profiles: [core, full]

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/tarka2026
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - fraud_neo4j:/data
    profiles: [graph, full]

  nats:
    image: nats:2-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - fraud_nats:/data
    profiles: [streaming, full]

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - fraud_ch:/var/lib/clickhouse
    profiles: [analytics, full]

  opa:
    image: openpolicyagent/opa:0.70.0
    command: ["run", "--server", "/policies/policy.rego"]
    volumes:
      - ./opa:/policies:ro
    ports:
      - "8181:8181"
    profiles: [opa, full]

  # ---------- Core Services ----------
  decision-api:
    build:
      context: ..
      dockerfile: services/decision-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
      REDIS_URL: redis://redis:6379/0
      RULES_PATH: /app/rules
      FEATURE_SERVICE_URL: ${FEATURE_SERVICE_URL:-}
      ML_SCORING_URL: ${ML_SCORING_URL:-}
      GRAPH_SERVICE_URL: ${GRAPH_SERVICE_URL:-}
      CALIBRATION_SERVICE_URL: ${CALIBRATION_SERVICE_URL:-}
      COUNTER_SERVICE_URL: ${COUNTER_SERVICE_URL:-}
      LOCATION_SERVICE_URL: ${LOCATION_SERVICE_URL:-}
      OPA_URL: ${OPA_URL:-}
      NATS_URL: nats://nats:4222
      # Dev/smoke: auth_rbac requires API_KEYS, OIDC, or this flag; host env is not injected unless listed here.
      # scripts/ci/full_stack_smoke.py POSTs /v1/decisions/evaluate without X-API-Key (health is skipped; evaluate is not).
      ALLOW_INSECURE_NO_AUTH: ${ALLOW_INSECURE_NO_AUTH:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    profiles: [core, full]

  graph-service:
    build:
      context: ..
      dockerfile: services/graph-service/Dockerfile
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: tarka2026
    ports:
      - "8001:8001"
    depends_on:
      - neo4j
    profiles: [graph, full]

  case-api:
    build:
      context: ..
      dockerfile: services/case-api/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
      GRAPH_SERVICE_URL: http://graph-service:8001
      DECISION_API_URL: http://decision-api:8000
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [cases, full]

  integration-ingress:
    build:
      context: ..
      dockerfile: services/integration-ingress/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://fraud:fraud@postgres:5432/fraud
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
    profiles: [integration, full]

  feature-service:
    build:
      context: ..
      dockerfile: services/feature-service/Dockerfile
    environment:
      REDIS_URL: redis://redis:6379/0
      FEATURE_SERVICE_REDIS_URL: redis://redis:6379/0
    ports:
      - "8004:8004"
    depends_on:
      redis:
        condition: service_started
    profiles: [ml, full, ui]

  ml-scoring:
    build:
      context: ..
      dockerfile: services/ml-scoring/Dockerfile
    environment:
      DISABLE_ML: ${DISABLE_ML:-false}
    ports:
      - "8005:8005"
    profiles: [ml, full]

  investigation-agent:
    build:
      context: ..
      dockerfile: services/investigation-agent/Dockerfile
    environment:
      CASE_API_URL: http://case-api:8002
      GRAPH_SERVICE_URL: http://graph-service:8001
      DECISION_API_URL: http://decision-api:8000
      ALLOWED_ANALYSTS: ${ALLOWED_ANALYSTS:-*}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_GOVERNANCE_PROFILE: ${AI_GOVERNANCE_PROFILE:-global}
      BATCH_TTL_SECONDS: ${BATCH_TTL_SECONDS:-7200}
      COPILOT_INJECTION_POLICY: ${COPILOT_INJECTION_POLICY:-sanitize}
    ports:
      - "8006:8006"
    depends_on:
      - case-api
    profiles: [agent, full, ui]

  # ---------- New Services ----------
  event-ingest:
    build:
      context: ..
      dockerfile: services/event-ingest/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      DECISION_API_URL: http://decision-api:8000
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8007:8007"
    depends_on:
      - nats
      - decision-api
      - redis
    profiles: [streaming, full]

  analytics-sink:
    build:
      context: ..
      dockerfile: services/analytics-sink/Dockerfile
    environment:
      CLICKHOUSE_HOST: clickhouse
      NATS_URL: nats://nats:4222
    ports:
      - "8008:8008"
    depends_on:
      - clickhouse
      - nats
    profiles: [analytics, full]

  collaboration-chat-bridge:
    build:
      context: ..
      dockerfile: services/collaboration-chat-bridge/Dockerfile
    environment:
      INVESTIGATION_AGENT_URL: http://investigation-agent:8006
      INVESTIGATION_AGENT_API_KEY: ${API_KEYS:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET:-}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN:-}
      TEAMS_BRIDGE_SECRET: ${TEAMS_BRIDGE_SECRET:-}
      LARK_VERIFICATION_TOKEN: ${LARK_VERIFICATION_TOKEN:-}
      LARK_TENANT_ACCESS_TOKEN: ${LARK_TENANT_ACCESS_TOKEN:-}
      DEFAULT_TENANT_ID: ${COLLAB_DEFAULT_TENANT_ID:-collab_default}
      DEFAULT_CASE_ID: ${COLLAB_DEFAULT_CASE_ID:-}
      DEFAULT_COPILOT_PERSONA: ${DEFAULT_COPILOT_PERSONA:-investigation}
    ports:
      - "8009:8009"
    depends_on:
      - investigation-agent
    profiles: [agent, full, collab]

  graphql-gateway:
    build:
      context: ..
      dockerfile: services/graphql-gateway/Dockerfile
    environment:
      DECISION_API_URL: http://decision-api:8000
      CASE_API_URL: http://case-api:8002
      GRAPH_SERVICE_URL: http://graph-service:8001
    ports:
      - "8010:8010"
    depends_on:
      - decision-api
      - case-api
    profiles: [gateway, full]

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_AI_GOVERNANCE_PROFILE: ${VITE_AI_GOVERNANCE_PROFILE:-global}
    ports:
      - "3000:80"
    depends_on:
      - decision-api
      - case-api
      - investigation-agent
      - feature-service
    profiles: [ui, full]

  calibration-service:
    build:
      context: ..
      dockerfile: services/calibration-service/Dockerfile
    environment:
      CALIBRATION_SERVICE_DATA_DIR: /data
      API_KEYS: ${API_KEYS:-}
    volumes:
      - fraud_calibration_data:/data
    ports:
      - "8011:8011"
    profiles: [risk, full]

  counter-service:
    build:
      context: ..
      dockerfile: services/counter-service/Dockerfile
    environment:
      COUNTER_SERVICE_REDIS_URL: redis://redis:6379/0
      API_KEYS: ${API_KEYS:-}
    depends_on:
      - redis
    ports:
      - "8012:8012"
    profiles: [risk, full]

  location-service:
    build:
      context: ..
      dockerfile: services/location-service/Dockerfile
    environment:
      LOCATION_SERVICE_DATA_DIR: /data
      API_KEYS: ${API_KEYS:-}
    volumes:
      - fraud_location_data:/data
    ports:
      - "8013:8013"
    profiles: [risk, full]

volumes:
  fraud_pg:
  fraud_neo4j:
  fraud_nats:
  fraud_ch:
  fraud_calibration_data:
  fraud_location_data:
