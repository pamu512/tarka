{{- if .Values.featureService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.fullname" . }}-feature-service
spec:
  replicas: {{ .Values.featureService.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tarka.fullname" . }}-feature-service
  template:
    metadata:
      labels:
        app: {{ include "tarka.fullname" . }}-feature-service
    spec:
      containers:
        - name: feature-service
          image: {{ include "tarka.image" (dict "registry" .Values.global.imageRegistry "image" .Values.featureService.image "tag" .Values.featureService.tag) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.featureService.servicePort }}
          env:
            {{- if or .Values.redis.enabled .Values.global.externalServices.redis.enabled }}
            - name: REDIS_URL
              {{- if .Values.global.externalServices.redis.enabled }}
              value: {{ .Values.global.externalServices.redis.redisUrl | quote }}
              {{- else }}
              value: "redis://{{ include "tarka.fullname" . }}-redis:6379/0"
              {{- end }}
            - name: FEATURE_SERVICE_REDIS_URL
              {{- if .Values.global.externalServices.redis.enabled }}
              value: {{ .Values.global.externalServices.redis.redisUrl | quote }}
              {{- else }}
              value: "redis://{{ include "tarka.fullname" . }}-redis:6379/0"
              {{- end }}
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.fullname" . }}-feature-service
spec:
  selector:
    app: {{ include "tarka.fullname" . }}-feature-service
  ports:
    - port: {{ .Values.featureService.servicePort }}
      targetPort: {{ .Values.featureService.servicePort }}
{{- end }}
