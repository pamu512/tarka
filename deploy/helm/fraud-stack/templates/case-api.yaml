{{- if .Values.caseApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.fullname" . }}-case-api
spec:
  replicas: {{ .Values.caseApi.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tarka.fullname" . }}-case-api
  template:
    metadata:
      labels:
        app: {{ include "tarka.fullname" . }}-case-api
    spec:
      containers:
        - name: case-api
          image: {{ include "tarka.image" (dict "registry" .Values.global.imageRegistry "image" .Values.caseApi.image "tag" .Values.caseApi.tag) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.caseApi.servicePort }}
          env:
            - name: DATABASE_URL
              {{- if .Values.global.externalServices.postgres.enabled }}
              value: {{ .Values.global.externalServices.postgres.databaseUrl | quote }}
              {{- else }}
              value: "postgresql+asyncpg://{{ .Values.postgres.auth.username }}:{{ .Values.postgres.auth.password | default "fraud" }}@{{ include "tarka.fullname" . }}-postgres:5432/{{ .Values.postgres.auth.database }}"
              {{- end }}
            {{- if .Values.graphService.enabled }}
            - name: GRAPH_SERVICE_URL
              value: "http://{{ include "tarka.fullname" . }}-graph-service:8001"
            {{- end }}
            {{- if .Values.decisionApi.enabled }}
            - name: DECISION_API_URL
              value: "http://{{ include "tarka.fullname" . }}-decision-api:8000"
            {{- end }}
            - name: TENANT_BINDING_REQUIRED
              value: {{ ternary "true" "false" .Values.caseApi.tenantBindingRequired | quote }}
            - name: ALLOW_INSECURE_NO_AUTH
              value: {{ ternary "true" "false" .Values.caseApi.allowInsecureNoAuth | quote }}
            {{- if .Values.global.appSecretsName }}
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: API_KEYS
                  optional: true
            - name: API_KEY_TENANT_MAP
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: API_KEY_TENANT_MAP
                  optional: true
            - name: EVIDENCE_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: EVIDENCE_SIGNING_SECRET
                  optional: true
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.fullname" . }}-case-api
spec:
  selector:
    app: {{ include "tarka.fullname" . }}-case-api
  ports:
    - port: {{ .Values.caseApi.servicePort }}
      targetPort: {{ .Values.caseApi.servicePort }}
{{- end }}
