{{- if .Values.eventIngest.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.fullname" . }}-event-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "tarka.fullname" . }}-event-ingest
  template:
    metadata:
      labels:
        app: {{ include "tarka.fullname" . }}-event-ingest
    spec:
      containers:
        - name: event-ingest
          image: "{{ .Values.eventIngest.image }}:{{ .Values.eventIngest.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.eventIngest.port }}
          env:
            - name: NATS_URL
              value: "nats://{{ include "tarka.fullname" . }}-nats:4222"
            - name: DECISION_API_URL
              value: "http://{{ include "tarka.fullname" . }}-decision-api:8000"
            {{- if .Values.redis.enabled }}
            - name: REDIS_URL
              value: "redis://{{ include "tarka.fullname" . }}-redis:6379/0"
            {{- end }}
            - name: API_KEYS
              value: {{ .Values.eventIngest.apiKeys | default "test-key-1" | quote }}
          readinessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.eventIngest.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.fullname" . }}-event-ingest
spec:
  selector:
    app: {{ include "tarka.fullname" . }}-event-ingest
  ports:
    - port: {{ .Values.eventIngest.port }}
      targetPort: {{ .Values.eventIngest.port }}
{{- end }}
