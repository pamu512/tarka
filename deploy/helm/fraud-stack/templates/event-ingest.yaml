{{- if .Values.eventIngest.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.fullname" . }}-event-ingest
spec:
  replicas: {{ .Values.eventIngest.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tarka.fullname" . }}-event-ingest
  template:
    metadata:
      labels:
        app: {{ include "tarka.fullname" . }}-event-ingest
    spec:
      containers:
        - name: event-ingest
          image: {{ include "tarka.image" (dict "registry" .Values.global.imageRegistry "image" .Values.eventIngest.image "tag" .Values.eventIngest.tag) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.eventIngest.port }}
          env:
            - name: NATS_URL
              {{- if .Values.global.externalServices.nats.enabled }}
              value: {{ .Values.global.externalServices.nats.url | quote }}
              {{- else }}
              value: "nats://{{ include "tarka.fullname" . }}-nats:4222"
              {{- end }}
            - name: DECISION_API_URL
              value: "http://{{ include "tarka.fullname" . }}-decision-api:8000"
            {{- if or .Values.redis.enabled .Values.global.externalServices.redis.enabled }}
            - name: REDIS_URL
              {{- if .Values.global.externalServices.redis.enabled }}
              value: {{ .Values.global.externalServices.redis.redisUrl | quote }}
              {{- else }}
              value: "redis://{{ include "tarka.fullname" . }}-redis:6379/0"
              {{- end }}
            {{- end }}
            - name: UPSTREAM_API_KEY
              value: {{ .Values.eventIngest.upstreamApiKey | default "" | quote }}
            - name: INGEST_SCHEMA_REGISTRY_MODE
              value: {{ .Values.eventIngest.schemaRegistryMode | default "enforce" | quote }}
            {{- if .Values.global.appSecretsName }}
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: API_KEYS
                  optional: true
            {{- else }}
            - name: API_KEYS
              value: {{ .Values.eventIngest.apiKeys | default "" | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: {{ .Values.eventIngest.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.eventIngest.port }}
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 4
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.fullname" . }}-event-ingest
spec:
  selector:
    app: {{ include "tarka.fullname" . }}-event-ingest
  ports:
    - port: {{ .Values.eventIngest.port }}
      targetPort: {{ .Values.eventIngest.port }}
{{- end }}
