{{- if .Values.analyticsSink.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.fullname" . }}-analytics-sink
spec:
  replicas: {{ .Values.analyticsSink.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tarka.fullname" . }}-analytics-sink
  template:
    metadata:
      labels:
        app: {{ include "tarka.fullname" . }}-analytics-sink
    spec:
      containers:
        - name: analytics-sink
          image: {{ include "tarka.image" (dict "registry" .Values.global.imageRegistry "image" .Values.analyticsSink.image "tag" .Values.analyticsSink.tag) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.analyticsSink.port }}
          env:
            - name: NATS_URL
              {{- if .Values.global.externalServices.nats.enabled }}
              value: {{ .Values.global.externalServices.nats.url | quote }}
              {{- else }}
              value: "nats://{{ include "tarka.fullname" . }}-nats:4222"
              {{- end }}
            - name: CLICKHOUSE_HOST
              {{- if .Values.global.externalServices.clickhouse.enabled }}
              value: {{ .Values.global.externalServices.clickhouse.host | quote }}
              {{- else }}
              value: "{{ include "tarka.fullname" . }}-clickhouse"
              {{- end }}
            - name: CLICKHOUSE_PORT
              {{- if .Values.global.externalServices.clickhouse.enabled }}
              value: {{ .Values.global.externalServices.clickhouse.port | quote }}
              {{- else }}
              value: "8123"
              {{- end }}
            - name: CLICKHOUSE_USER
              {{- if .Values.global.externalServices.clickhouse.enabled }}
              value: {{ .Values.global.externalServices.clickhouse.user | quote }}
              {{- else }}
              value: {{ .Values.clickhouse.user | quote }}
              {{- end }}
            - name: CLICKHOUSE_PASSWORD
              {{- if .Values.global.externalServices.clickhouse.enabled }}
              value: {{ .Values.global.externalServices.clickhouse.password | quote }}
              {{- else }}
              value: {{ .Values.clickhouse.password | quote }}
              {{- end }}
            - name: CLICKHOUSE_DATABASE
              {{- if .Values.global.externalServices.clickhouse.enabled }}
              value: {{ .Values.global.externalServices.clickhouse.database | quote }}
              {{- else }}
              value: {{ .Values.clickhouse.database | quote }}
              {{- end }}
            - name: TENANT_BINDING_REQUIRED
              value: {{ ternary "true" "false" .Values.analyticsSink.tenantBindingRequired | quote }}
            - name: API_KEY_TENANT_MAP
              value: {{ .Values.analyticsSink.apiKeyTenantMap | default "" | quote }}
            {{- if .Values.global.appSecretsName }}
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: API_KEYS
                  optional: true
            {{- else }}
            - name: API_KEYS
              value: {{ .Values.analyticsSink.apiKeys | default "" | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.analyticsSink.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.fullname" . }}-analytics-sink
spec:
  selector:
    app: {{ include "tarka.fullname" . }}-analytics-sink
  ports:
    - port: {{ .Values.analyticsSink.port }}
      targetPort: {{ .Values.analyticsSink.port }}
{{- end }}
