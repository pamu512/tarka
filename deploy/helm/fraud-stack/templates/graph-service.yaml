{{- if .Values.graphService.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.fullname" . }}-graph-service
spec:
  replicas: {{ .Values.graphService.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tarka.fullname" . }}-graph-service
  template:
    metadata:
      labels:
        app: {{ include "tarka.fullname" . }}-graph-service
    spec:
      containers:
        - name: graph-service
          image: {{ include "tarka.image" (dict "registry" .Values.global.imageRegistry "image" .Values.graphService.image "tag" .Values.graphService.tag) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.graphService.servicePort }}
          env:
            - name: NEO4J_URI
              {{- if .Values.global.externalServices.neo4j.enabled }}
              value: {{ .Values.global.externalServices.neo4j.uri | quote }}
              {{- else }}
              value: "bolt://{{ include "tarka.fullname" . }}-neo4j:7687"
              {{- end }}
            - name: NEO4J_USER
              {{- if .Values.global.externalServices.neo4j.enabled }}
              value: {{ .Values.global.externalServices.neo4j.user | quote }}
              {{- else }}
              value: {{ .Values.neo4j.auth.user | quote }}
              {{- end }}
            - name: NEO4J_PASSWORD
              {{- if .Values.global.externalServices.neo4j.enabled }}
              value: {{ .Values.global.externalServices.neo4j.password | quote }}
              {{- else }}
              value: {{ .Values.neo4j.auth.password | quote }}
              {{- end }}
            - name: TENANT_BINDING_REQUIRED
              value: "true"
            {{- if .Values.global.appSecretsName }}
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: API_KEYS
                  optional: true
            - name: API_KEY_TENANT_MAP
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: API_KEY_TENANT_MAP
                  optional: true
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.fullname" . }}-graph-service
spec:
  selector:
    app: {{ include "tarka.fullname" . }}-graph-service
  ports:
    - port: {{ .Values.graphService.servicePort }}
      targetPort: {{ .Values.graphService.servicePort }}
{{- end }}
