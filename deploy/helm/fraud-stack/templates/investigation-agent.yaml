{{- if .Values.investigationAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.fullname" . }}-investigation-agent
spec:
  replicas: {{ .Values.investigationAgent.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tarka.fullname" . }}-investigation-agent
  template:
    metadata:
      labels:
        app: {{ include "tarka.fullname" . }}-investigation-agent
    spec:
      containers:
        - name: investigation-agent
          image: {{ include "tarka.image" (dict "registry" .Values.global.imageRegistry "image" .Values.investigationAgent.image "tag" .Values.investigationAgent.tag) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.investigationAgent.servicePort }}
          env:
            {{- if .Values.caseApi.enabled }}
            - name: CASE_API_URL
              value: "http://{{ include "tarka.fullname" . }}-case-api:8002"
            {{- end }}
            {{- if .Values.graphService.enabled }}
            - name: GRAPH_SERVICE_URL
              value: "http://{{ include "tarka.fullname" . }}-graph-service:8001"
            {{- end }}
            {{- if .Values.decisionApi.enabled }}
            - name: DECISION_API_URL
              value: "http://{{ include "tarka.fullname" . }}-decision-api:8000"
            {{- end }}
            - name: AI_GOVERNANCE_PROFILE
              value: {{ .Values.investigationAgent.aiGovernanceProfile | default "global" | quote }}
            {{- if .Values.investigationAgent.batchTtlSeconds }}
            - name: BATCH_TTL_SECONDS
              value: {{ .Values.investigationAgent.batchTtlSeconds | quote }}
            {{- end }}
            {{- range $k, $v := .Values.investigationAgent.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.fullname" . }}-investigation-agent
spec:
  selector:
    app: {{ include "tarka.fullname" . }}-investigation-agent
  ports:
    - port: {{ .Values.investigationAgent.servicePort }}
      targetPort: {{ .Values.investigationAgent.servicePort }}
{{- end }}
