{{- if .Values.decisionApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.fullname" . }}-decision-api
spec:
  replicas: {{ .Values.decisionApi.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tarka.fullname" . }}-decision-api
  template:
    metadata:
      labels:
        app: {{ include "tarka.fullname" . }}-decision-api
    spec:
      containers:
        - name: decision-api
          image: {{ include "tarka.image" (dict "registry" .Values.global.imageRegistry "image" .Values.decisionApi.image "tag" .Values.decisionApi.tag) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.decisionApi.servicePort }}
          env:
            - name: DATABASE_URL
              {{- if .Values.global.externalServices.postgres.enabled }}
              value: {{ .Values.global.externalServices.postgres.databaseUrl | quote }}
              {{- else }}
              value: "postgresql+asyncpg://{{ .Values.postgres.auth.username }}:{{ .Values.postgres.auth.password | default "fraud" }}@{{ include "tarka.fullname" . }}-postgres:5432/{{ .Values.postgres.auth.database }}"
              {{- end }}
            - name: REDIS_URL
              {{- if .Values.global.externalServices.redis.enabled }}
              value: {{ .Values.global.externalServices.redis.redisUrl | quote }}
              {{- else }}
              value: "redis://{{ include "tarka.fullname" . }}-redis:6379/0"
              {{- end }}
            - name: RULES_PATH
              value: "/app/rules"
            {{- if .Values.featureService.enabled }}
            - name: FEATURE_SERVICE_URL
              value: "http://{{ include "tarka.fullname" . }}-feature-service:{{ .Values.featureService.servicePort }}"
            {{- end }}
            {{- if .Values.mlScoring.enabled }}
            - name: ML_SCORING_URL
              value: "http://{{ include "tarka.fullname" . }}-ml-scoring:{{ .Values.mlScoring.servicePort }}"
            {{- end }}
            {{- if .Values.graphService.enabled }}
            - name: GRAPH_SERVICE_URL
              value: "http://{{ include "tarka.fullname" . }}-graph-service:{{ .Values.graphService.servicePort }}"
            {{- end }}
            {{- if .Values.mlScoring.enabled }}
            - name: CALIBRATION_SERVICE_URL
              value: "http://{{ include "tarka.fullname" . }}-ml-scoring:{{ .Values.mlScoring.servicePort }}"
            {{- end }}
            {{- if .Values.counterService.enabled }}
            - name: COUNTER_SERVICE_URL
              value: "http://{{ include "tarka.fullname" . }}-counter-service:{{ .Values.counterService.port }}"
            {{- end }}
            {{- if .Values.locationService.enabled }}
            - name: LOCATION_SERVICE_URL
              value: "http://{{ include "tarka.fullname" . }}-location-service:{{ .Values.locationService.port }}"
            {{- end }}
            {{- if .Values.opa.enabled }}
            - name: OPA_URL
              value: "http://{{ include "tarka.fullname" . }}-opa:{{ .Values.opa.port }}"
            {{- end }}
            {{- if or .Values.nats.enabled .Values.global.externalServices.nats.enabled }}
            - name: NATS_URL
              {{- if .Values.global.externalServices.nats.enabled }}
              value: {{ .Values.global.externalServices.nats.url | quote }}
              {{- else }}
              value: "nats://{{ include "tarka.fullname" . }}-nats:4222"
              {{- end }}
            {{- end }}
            - name: ALLOW_INSECURE_NO_AUTH
              value: {{ ternary "true" "false" .Values.decisionApi.allowInsecureNoAuth | quote }}
            - name: TENANT_BINDING_REQUIRED
              value: {{ ternary "true" "false" .Values.decisionApi.tenantBindingRequired | quote }}
            - name: API_KEY_TENANT_MAP
              value: {{ .Values.decisionApi.apiKeyTenantMap | default "" | quote }}
            - name: EDGE_SECURITY_SIGNALS_ENABLED
              value: {{ ternary "true" "false" .Values.decisionApi.edgeSecurity.enabled | quote }}
            - name: EDGE_WAF_ACTION_HEADER
              value: {{ .Values.decisionApi.edgeSecurity.wafActionHeader | default "x-waf-action" | quote }}
            - name: EDGE_BOT_SCORE_HEADER
              value: {{ .Values.decisionApi.edgeSecurity.botScoreHeader | default "x-bot-score" | quote }}
            - name: EDGE_BOT_SCORE_BLOCK_THRESHOLD
              value: {{ .Values.decisionApi.edgeSecurity.botScoreBlockThreshold | default 25 | quote }}
            - name: EDGE_BOT_SCORE_REVIEW_THRESHOLD
              value: {{ .Values.decisionApi.edgeSecurity.botScoreReviewThreshold | default 50 | quote }}
            {{- range $k, $v := .Values.decisionApi.extraEnv }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- if .Values.global.appSecretsName }}
            - name: API_KEYS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: API_KEYS
                  optional: true
            {{- end }}
          readinessProbe:
            httpGet:
              path: /v1/ready
              port: {{ .Values.decisionApi.servicePort }}
            initialDelaySeconds: 8
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /v1/health
              port: {{ .Values.decisionApi.servicePort }}
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 2
            failureThreshold: 4
          {{- with .Values.decisionApi.resources }}
          resources:
{{ toYaml . | indent 12 }}
          {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.fullname" . }}-decision-api
spec:
  selector:
    app: {{ include "tarka.fullname" . }}-decision-api
  ports:
    - port: {{ .Values.decisionApi.servicePort }}
      targetPort: {{ .Values.decisionApi.servicePort }}
{{- end }}
