{{- if .Values.mlScoring.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.fullname" . }}-ml-scoring
spec:
  replicas: {{ .Values.mlScoring.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tarka.fullname" . }}-ml-scoring
  template:
    metadata:
      labels:
        app: {{ include "tarka.fullname" . }}-ml-scoring
    spec:
      containers:
        - name: ml-scoring
          image: {{ include "tarka.image" (dict "registry" .Values.global.imageRegistry "image" .Values.mlScoring.image "tag" .Values.mlScoring.tag) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.mlScoring.servicePort }}
          env:
            {{- if .Values.triton.enabled }}
            - name: TRITON_URL
              value: "http://{{ include "tarka.fullname" . }}-triton:{{ .Values.triton.servicePort }}"
            - name: TRITON_MODEL_INPUT
              value: {{ .Values.mlScoring.tritonModelInput | default "X" | quote }}
            - name: TRITON_MODEL_OUTPUT
              value: {{ .Values.mlScoring.tritonModelOutput | default "probabilities" | quote }}
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.fullname" . }}-ml-scoring
spec:
  selector:
    app: {{ include "tarka.fullname" . }}-ml-scoring
  ports:
    - port: {{ .Values.mlScoring.servicePort }}
      targetPort: {{ .Values.mlScoring.servicePort }}
{{- end }}
