{{- if .Values.mlScoring.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.fullname" . }}-ml-scoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "tarka.fullname" . }}-ml-scoring
  template:
    metadata:
      labels:
        app: {{ include "tarka.fullname" . }}-ml-scoring
    spec:
      containers:
        - name: ml-scoring
          image: "{{ .Values.mlScoring.image }}:{{ .Values.mlScoring.tag }}"
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: 8005
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.fullname" . }}-ml-scoring
spec:
  selector:
    app: {{ include "tarka.fullname" . }}-ml-scoring
  ports:
    - port: 8005
      targetPort: 8005
{{- end }}
