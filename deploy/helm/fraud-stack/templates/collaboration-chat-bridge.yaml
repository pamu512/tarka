{{- if .Values.collaborationChatBridge.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "tarka.fullname" . }}-collaboration-chat-bridge
spec:
  replicas: {{ .Values.collaborationChatBridge.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "tarka.fullname" . }}-collaboration-chat-bridge
  template:
    metadata:
      labels:
        app: {{ include "tarka.fullname" . }}-collaboration-chat-bridge
    spec:
      containers:
        - name: collaboration-chat-bridge
          image: {{ include "tarka.image" (dict "registry" .Values.global.imageRegistry "image" .Values.collaborationChatBridge.image "tag" .Values.collaborationChatBridge.tag) | quote }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ .Values.collaborationChatBridge.port }}
          env:
            - name: INVESTIGATION_AGENT_URL
              value: {{ .Values.collaborationChatBridge.investigationAgentUrl | default (printf "http://%s-investigation-agent:%v" (include "tarka.fullname" .) .Values.investigationAgent.servicePort) | quote }}
            - name: INVESTIGATION_AGENT_API_KEY
              value: {{ .Values.collaborationChatBridge.investigationAgentApiKey | default "" | quote }}
            - name: DEFAULT_TENANT_ID
              value: {{ .Values.collaborationChatBridge.defaultTenantId | quote }}
            - name: DEFAULT_CASE_ID
              value: {{ .Values.collaborationChatBridge.defaultCaseId | quote }}
            - name: DEFAULT_COPILOT_PERSONA
              value: {{ .Values.collaborationChatBridge.defaultCopilotPersona | quote }}
            {{- if .Values.global.appSecretsName }}
            - name: SLACK_SIGNING_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: SLACK_SIGNING_SECRET
                  optional: true
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: SLACK_BOT_TOKEN
                  optional: true
            - name: TEAMS_BRIDGE_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: TEAMS_BRIDGE_SECRET
                  optional: true
            - name: LARK_VERIFICATION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: LARK_VERIFICATION_TOKEN
                  optional: true
            - name: LARK_TENANT_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.global.appSecretsName | quote }}
                  key: LARK_TENANT_ACCESS_TOKEN
                  optional: true
            {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "tarka.fullname" . }}-collaboration-chat-bridge
spec:
  selector:
    app: {{ include "tarka.fullname" . }}-collaboration-chat-bridge
  ports:
    - port: {{ .Values.collaborationChatBridge.port }}
      targetPort: {{ .Values.collaborationChatBridge.port }}
{{- end }}
