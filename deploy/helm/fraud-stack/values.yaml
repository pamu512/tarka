# Tarka Helm values
#
# Enable flags below toggle Deployments/Services in templates/*.yaml. They do NOT set every
# container env var here—templates wire dependencies, for example:
#   - case-api gets DECISION_API_URL when decisionApi.enabled (disputes / audit callbacks).
#   - investigation-agent gets CASE_API_URL, DECISION_API_URL, optional GRAPH_SERVICE_URL.
#   - event-ingest gets DECISION_API_URL and NATS_URL when enabled.
#
# Optional app secrets (use Kubernetes Secrets in production; do not commit real values):
#   OPENAI_API_KEY, UPSTREAM_API_KEY / API_KEYS, ATTESTATION_HMAC_SECRET, EVIDENCE_SIGNING_SECRET
#
# Port reference (host-facing defaults): docs/docs/guides/service-ports.md
# Env semantics (localhost defaults): docs/docs/guides/deployment.md
# Compose .env.example: deploy/.env.example
#
# Enable only the components you need.
global:
  imageRegistry: ""
  imagePullPolicy: IfNotPresent

postgres:
  enabled: true
  auth:
    username: fraud
    password: fraud
    database: fraud

redis:
  enabled: true

decisionApi:
  enabled: true
  image: tarka-decision-api
  tag: latest
  replicaCount: 2

graphService:
  enabled: false
  image: tarka-graph-service
  tag: latest

neo4j:
  enabled: false

caseApi:
  enabled: false
  image: tarka-case-api
  tag: latest

featureService:
  enabled: false
  image: tarka-feature-service
  tag: latest

mlScoring:
  enabled: false
  image: tarka-ml-scoring
  tag: latest

investigationAgent:
  enabled: false
  image: tarka-investigation-agent
  tag: latest
  # Regional AI governance: us | eu_uk | global (see docs/docs/guides/ai-governance-regional-builds.md)
  aiGovernanceProfile: global
  # Optional in-memory batch TTL for copilot uploads (seconds); omit to use default
  batchTtlSeconds: null
  extraEnv: {}

integrationIngress:
  enabled: false
  image: tarka-integration-ingress
  tag: latest

nats:
  enabled: true
  image: nats:2-alpine

clickhouse:
  enabled: true
  image: clickhouse/clickhouse-server:24-alpine
  user: default
  password: ""
  database: fraud

eventIngest:
  enabled: true
  image: tarka-event-ingest
  tag: latest
  port: 8007
  apiKeys: "test-key-1"

analyticsSink:
  enabled: true
  image: tarka-analytics-sink
  tag: latest
  port: 8008
  apiKeys: "test-key-1"

graphqlGateway:
  enabled: true
  image: tarka-graphql-gateway
  tag: latest
  port: 8010

frontend:
  enabled: true
  image: tarka-frontend
  tag: latest
  port: 80
  serviceType: ClusterIP
