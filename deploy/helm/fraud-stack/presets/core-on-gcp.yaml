global:
  environment: prod
  imageRegistry: "__IMAGE_REGISTRY__"
  externalServices:
    postgres:
      enabled: true
      databaseUrl: "__DB_URL__"
    redis:
      enabled: true
      redisUrl: "__REDIS_URL__"

postgres:
  enabled: false
redis:
  enabled: false
neo4j:
  enabled: false
nats:
  enabled: false
clickhouse:
  enabled: false

