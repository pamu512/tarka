  replicaCount: 2
featureService:
  enabled: true
mlScoring:
  enabled: true

caseApi:
  enabled: false
investigationAgent:
  enabled: false
integrationIngress:
  enabled: false
eventIngest:
  enabled: false
analyticsSink:
  enabled: false
graphqlGateway:
  enabled: false
frontend:
  enabled: false
