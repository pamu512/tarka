{{- if .Values.credentials.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "tarka.fullname" . }}-credentials
  labels:
    {{- include "tarka.labels" . | nindent 4 }}
  annotations:
    meta.helm.sh/release-name: {{ .Release.Name }}
    meta.helm.sh/release-namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  # Core + graph + ingress (Postgres)
  DATABASE_URL: "postgresql+asyncpg://{{ .Values.platform.postgres.user }}:{{ .Values.credentials.postgresPassword }}@{{ .Values.platform.postgres.host }}:{{ .Values.platform.postgres.port }}/{{ .Values.platform.postgres.database }}"
  {{- if .Values.credentials.redisPassword }}
  REDIS_URL: "redis://:{{ .Values.credentials.redisPassword }}@{{ .Values.platform.redis.host }}:{{ .Values.platform.redis.port }}/{{ .Values.platform.redis.database }}"
  {{- else }}
  REDIS_URL: "redis://{{ .Values.platform.redis.host }}:{{ .Values.platform.redis.port }}/{{ .Values.platform.redis.database }}"
  {{- end }}
  # NATS (single URL string consumed by decision-api, case-api, data-plane, analytics-sink, event-ingest)
  {{- if and .Values.credentials.natsUsername .Values.credentials.natsPassword }}
  NATS_URL: "nats://{{ .Values.credentials.natsUsername }}:{{ .Values.credentials.natsPassword }}@{{ .Values.platform.nats.host }}:{{ .Values.platform.nats.port }}"
  {{- else if .Values.platform.nats.urlOverride }}
  NATS_URL: {{ .Values.platform.nats.urlOverride | quote }}
  {{- else }}
  NATS_URL: "nats://{{ .Values.platform.nats.host }}:{{ .Values.platform.nats.port }}"
  {{- end }}
  # ClickHouse native + HTTP auth (analytics-sink / decision-api feature paths / data-plane)
  CLICKHOUSE_USER: {{ .Values.credentials.clickhouseUser | quote }}
  CLICKHOUSE_PASSWORD: {{ .Values.credentials.clickhousePassword | quote }}
  # Optional API key material (comma-separated keys, X-Api-Key)
  {{- if .Values.credentials.apiKeys }}
  API_KEYS: {{ .Values.credentials.apiKeys | quote }}
  {{- else }}
  API_KEYS: ""
  {{- end }}
  UPSTREAM_API_KEY: {{ .Values.credentials.upstreamApiKey | quote }}
{{- end }}
