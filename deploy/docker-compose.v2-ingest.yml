# Tarka v2 ingest path: rule engine + shadow sidecar + orchestrator (see docs/SYSTEM_DESIGN.md).
# Context for builds is tarka_v2_core/ (Dockerfiles COPY services/...).
# Run from repository root via scripts/phase9/*.sh

name: tarka-v2-ingest

services:
  rule_engine:
    build:
      context: ./tarka_v2_core
      dockerfile: services/rule_engine/Dockerfile
    ports:
      - "8778:8778"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8778/health', timeout=5).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 6
      start_period: 15s

  shadow_agent:
    build:
      context: ./tarka_v2_core
      dockerfile: services/shadow_agent/Dockerfile
    ports:
      - "8801:8801"
    environment:
      SHADOW_API_KEY: ${TARKA_SHADOW_API_KEY:-dev-shadow-token-change-me}
      SHADOW_DATABASE_URL: sqlite+aiosqlite:////tmp/shadow_audit.db
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import os,urllib.request;t=os.environ.get('SHADOW_API_KEY','');r=urllib.request.Request('http://127.0.0.1:8801/health/db',headers={'X-Shadow-Token':t});urllib.request.urlopen(r,timeout=5).read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 8
      start_period: 25s

  orchestrator:
    build:
      context: ./tarka_v2_core
      dockerfile: services/orchestrator/Dockerfile
    ports:
      - "8790:8790"
    environment:
      RULE_ENGINE_URL: http://rule_engine:8778
      SHADOW_AGENT_URL: http://shadow_agent:8801
      SHADOW_API_KEY: ${TARKA_SHADOW_API_KEY:-dev-shadow-token-change-me}
    depends_on:
      rule_engine:
        condition: service_healthy
      shadow_agent:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8790/health/full', timeout=10).read()",
        ]
      interval: 5s
      timeout: 12s
      retries: 6
      start_period: 20s
