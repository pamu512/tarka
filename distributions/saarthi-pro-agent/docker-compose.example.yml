# Run from fraud-stack repository root:
#   docker compose -f distributions/saarthi-pro-agent/docker-compose.example.yml up --build
services:
  saarthi-pro-agent:
    build:
      context: .
      dockerfile: distributions/saarthi-pro-agent/Dockerfile
      args:
        SAARTHI_PRO_VERSION: "0.1.0"
        FRAUD_STACK_GIT_SHA: "local-build"
        INTEGRATION_CONTRACT_VERSION: "1.1.0"
    image: saarthi-pro-agent:0.1.0
    ports:
      - "8006:8006"
    environment:
      AGENT_BUILD_ID: "compose-local"
      INTEGRATION_PROFILE_ID: "tarka_reference_v1"
      CASE_API_URL: "${CASE_API_URL:-http://host.docker.internal:8002}"
      DECISION_API_URL: "${DECISION_API_URL:-http://host.docker.internal:8000}"
      GRAPH_SERVICE_URL: "${GRAPH_SERVICE_URL:-}"
