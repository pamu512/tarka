server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Docker embedded DNS — resolve upstreams per request (avoids startup failure
    # if a peer container is not yet registered).
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/decisions/ {
        rewrite ^/api/decisions/(.*)$ /$1 break;
        set $u http://decision-api:8000;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/cases/ {
        rewrite ^/api/cases/(.*)$ /$1 break;
        set $u http://case-api:8002;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/graph/ {
        rewrite ^/api/graph/(.*)$ /$1 break;
        set $u http://graph-service:8001;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ml/ {
        rewrite ^/api/ml/(.*)$ /$1 break;
        set $u http://ml-scoring:8005;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Feature service: velocity counters + parity verify (OSS #48) — same Redis as decision-api
    location /api/features/ {
        rewrite ^/api/features/(.*)$ /$1 break;
        set $u http://feature-service:8004;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/analytics/ {
        rewrite ^/api/analytics/(.*)$ /$1 break;
        set $u http://analytics-sink:8008;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ingress/ {
        rewrite ^/api/ingress/(.*)$ /$1 break;
        set $u http://integration-ingress:8003;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/investigation/ {
        rewrite ^/api/investigation/(.*)$ /$1 break;
        set $u http://investigation-agent:8006;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
