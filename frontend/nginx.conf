server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Docker embedded DNS — resolve upstreams per request (avoids startup failure
    # if a peer container is not yet registered).
    resolver 127.0.0.11 valid=30s ipv6=off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/decisions/ {
        rewrite ^/api/decisions/(.*)$ /decisions/$1 break;
        set $u http://core-api:8000;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/cases/ {
        rewrite ^/api/cases/(.*)$ /cases/$1 break;
        set $u http://core-api:8000;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Root-mounted core routes (e.g. unified command palette search).
    location /api/core/ {
        rewrite ^/api/core/(.*)$ /$1 break;
        set $u http://core-api:8000;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/graph/ {
        rewrite ^/api/graph/(.*)$ /$1 break;
        set $u http://graph-service:8001;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ml/ {
        rewrite ^/api/ml/(.*)$ /ml/$1 break;
        set $u http://signal-api:8004;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Feature service: velocity counters + parity verify (OSS #48) — same Redis as decision-api
    location /api/features/ {
        rewrite ^/api/features/(.*)$ /features/$1 break;
        set $u http://signal-api:8004;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Signal API process root: /v1/health, /metrics (not under /features).
    location /api/signal-plane/ {
        rewrite ^/api/signal-plane/(.*)$ /$1 break;
        set $u http://signal-api:8004;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/analytics/ {
        rewrite ^/api/analytics/(.*)$ /$1 break;
        set $u http://data-plane:8007;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ingest/ {
        rewrite ^/api/ingest/(.*)$ /$1 break;
        set $u http://data-plane:8007;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ingress/ {
        rewrite ^/api/ingress/(.*)$ /$1 break;
        set $u http://integration-ingress:8003;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/investigation/ {
        rewrite ^/api/investigation/(.*)$ /$1 break;
        set $u http://investigation-agent:8006;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Collaboration bridge (Slack / Teams / Lark) — served by investigation-agent under /collab
    location /api/collab/ {
        rewrite ^/api/collab/(.*)$ /collab/$1 break;
        set $u http://investigation-agent:8006;
        proxy_pass $u;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
