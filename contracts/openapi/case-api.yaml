openapi: 3.1.0
info:
  title: Tarka Case & Label API
  version: 1.0.0
  description: Investigations, cases, labels, and analyst workflow.
servers:
  - url: http://localhost:8002
paths:
  /v1/health:
    get:
      operationId: caseHealth
      responses:
        "200":
          description: OK
  /v1/cases:
    get:
      operationId: listCases
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_review, closed]
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Paginated case list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Case"
    post:
      operationId: createCase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseRequest"
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
  /v1/cases/{case_id}:
    get:
      operationId: getCase
      parameters:
        - name: case_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: tenant_id
          in: query
          required: true
          description: Must match the case tenant (prevents cross-tenant case access by ID)
          schema: { type: string }
      responses:
        "200":
          description: Case detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
    patch:
      operationId: updateCase
      parameters:
        - name: case_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string }
                priority: { type: string }
                assigned_team: { type: string }
                title: { type: string }
      responses:
        "200":
          description: Updated case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"
  /v1/cases/bulk-update:
    post:
      operationId: bulkUpdateCases
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, case_ids]
              properties:
                tenant_id: { type: string }
                case_ids:
                  type: array
                  items: { type: string, format: uuid }
                status: { type: string }
                priority: { type: string }
                assigned_team: { type: string }
                add_labels:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: OK
  /v1/cases/{case_id}/comments:
    post:
      operationId: addComment
      parameters:
        - name: case_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [author, body]
              properties:
                author: { type: string }
                body: { type: string }
      responses:
        "201":
          description: Created
  /v1/cases/{case_id}/labels:
    post:
      operationId: applyLabels
      parameters:
        - name: case_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [labels]
              properties:
                labels:
                  type: array
                  items: { type: string }
      responses:
        "200":
          description: OK
  /v1/cases/{case_id}/playbooks/{playbook_id}:
    post:
      operationId: applyPlaybook
      parameters:
        - name: case_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: playbook_id
          in: path
          required: true
          schema: { type: string }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
  /v1/cases/{case_id}/graph:
    get:
      operationId: caseGraph
      parameters:
        - name: case_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: depth
          in: query
          schema: { type: integer, default: 2 }
      responses:
        "200":
          description: OK
  /v1/cases/{case_id}/decision-explanation:
    get:
      operationId: caseDecisionExplanation
      summary: Graph decision explanation for case (via decision-api audit)
      parameters:
        - name: case_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: >-
            Wraps decision-api GET /v1/audit/{trace_id} for the case trace_id; graph_decision_explanation when graph risk ran.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                properties:
                  case_id: { type: string }
                  trace_id: { type: string }
                  entity_id: { type: string }
                  source: { type: string }
                  decision: { type: string, nullable: true }
                  score: { type: number, nullable: true }
                  graph_decision_explanation: { type: object, nullable: true, additionalProperties: true }
  /v1/cases/{case_id}/audit:
    get:
      operationId: caseAudit
      parameters:
        - name: case_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: OK
  /v1/cases/{case_id}/sla:
    get:
      operationId: caseSla
      parameters:
        - name: case_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
  /v1/cases/{case_id}/sar/generate:
    post:
      operationId: generateSar
      parameters:
        - name: case_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                format: { type: string }
      responses:
        "201":
          description: Created
  /v1/cases/{case_id}/sar:
    get:
      operationId: listSarFilings
      parameters:
        - name: case_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: OK
  /v1/cases/ops/kpis:
    get:
      operationId: caseOpsKpis
      summary: Queue health KPIs (full tenant aggregate)
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: KPI bundle
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/cases/ops/kpi-series:
    get:
      operationId: caseOpsKpiSeries
      summary: Dashboard-ready KPI time series (daily or weekly buckets)
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: granularity
          in: query
          schema: { type: string, enum: [daily, weekly], default: daily }
        - name: periods
          in: query
          schema: { type: integer, default: 14, minimum: 1, maximum: 52 }
        - name: as_of
          in: query
          required: false
          description: Optional ISO-8601 anchor (UTC) for reproducible exports
          schema: { type: string }
      responses:
        "200":
          description: KPI series and window summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/cases/analytics/cohort-compare:
    get:
      operationId: caseCohortCompare
      summary: Case volume vs prior window
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: period_days
          in: query
          schema: { type: integer, default: 7 }
      responses:
        "200":
          description: Cohort comparison
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/cases/ops/desk-activity:
    get:
      operationId: caseDeskActivity
      summary: Analyst touch volume from audit trail (recent window)
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: period_days
          in: query
          schema: { type: integer, default: 7 }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
      responses:
        "200":
          description: Desk activity summary
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/investigation-label-drafts/batch:
    post:
      operationId: investigationLabelDraftsBatch
      summary: Append analyst investigation label drafts (tenant + analyst scoped; durable)
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [analyst_id, rows]
              properties:
                analyst_id: { type: string }
                clear_existing: { type: boolean, default: false }
                rows:
                  type: array
                  maxItems: 50
                  items:
                    type: object
                    required: [y_label]
                    properties:
                      trace_id: { type: string, format: uuid, nullable: true }
                      entity_id: { type: string, nullable: true }
                      y_label:
                        type: string
                        enum: [fraud, legitimate, unknown]
                      source: { type: string }
                      notes: { type: string, nullable: true }
      responses:
        "200":
          description: Batch result
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  added: { type: integer }
                  stored_total: { type: integer }
                  max_per_analyst: { type: integer }
  /v1/investigation-label-drafts:
    get:
      operationId: listInvestigationLabelDrafts
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: analyst_id
          in: query
          required: true
          schema: { type: string }
        - name: limit
          in: query
          schema: { type: integer, default: 200 }
      responses:
        "200":
          description: Draft list
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { type: object, additionalProperties: true }
                  total: { type: integer }
    delete:
      operationId: clearInvestigationLabelDrafts
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: analyst_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  deleted: { type: integer }
  /v1/investigation-label-drafts/{draft_id}:
    delete:
      operationId: deleteInvestigationLabelDraft
      parameters:
        - name: draft_id
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: analyst_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted
        "404":
          description: Not found
components:
  schemas:
    CreateCaseRequest:
      type: object
      required: [tenant_id, title, entity_id, trace_id]
      properties:
        tenant_id: { type: string }
        title: { type: string }
        entity_id: { type: string }
        trace_id: { type: string }
        priority: { type: string, enum: [low, medium, high] }
        playbook_id:
          type: string
          nullable: true
          description: Optional built-in investigation playbook applied immediately after create (catalog from GET /v1/cases/playbooks).
    Case:
      type: object
      properties:
        id: { type: string, format: uuid }
        tenant_id: { type: string }
        title: { type: string }
        status: { type: string }
        entity_id: { type: string }
        trace_id: { type: string }
        labels:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
