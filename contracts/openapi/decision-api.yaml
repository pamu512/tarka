openapi: 3.1.0
info:
  title: Tarka Decision API
  version: 1.0.0
  description: Synchronous fraud scoring and event ingestion. SDK clients call this service only.
servers:
  - url: http://localhost:8000
    description: Local
paths:
  /v1/health:
    get:
      operationId: healthCheck
      summary: Liveness probe
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /v1/decisions/evaluate:
    post:
      operationId: evaluateDecision
      summary: Evaluate fraud decision for an event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
      responses:
        "200":
          description: Decision result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
        "422":
          description: Validation error
  /v1/attestation/challenge:
    post:
      operationId: attestationChallenge
      summary: Issue a nonce for SDK attestation handshake
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id]
              properties:
                tenant_id: { type: string }
      responses:
        "200":
          description: Nonce issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  nonce: { type: string }
                  expires_in: { type: integer, description: TTL in seconds }
  /v1/attestation/verify:
    post:
      operationId: attestationVerify
      summary: Verify an attestation token from the SDK
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [nonce, token, provider]
              properties:
                nonce: { type: string }
                token: { type: string }
                provider: { type: string, enum: [play_integrity, app_attest, browser_challenge] }
      responses:
        "200":
          description: Attestation verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  device_integrity: { type: string, nullable: true }
        "400":
          description: Invalid or expired nonce
  /v1/audit/{trace_id}:
    get:
      operationId: getAuditByTraceId
      summary: Fetch audit record by trace id (tenant-scoped)
      parameters:
        - name: trace_id
          in: path
          required: true
          schema:
            type: string
        - name: tenant_id
          in: query
          required: true
          description: Must match the audit row tenant_id
          schema:
            type: string
      responses:
        "200":
          description: Audit row
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Not found
  /v1/analyst/entity-velocity:
    get:
      operationId: analystEntityVelocity
      summary: Velocity aggregates and inference slice for investigations (read-only)
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
        - name: entity_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Velocity features, inference_velocity, anomaly_flags
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid entity_id
  /v1/replay:
    post:
      operationId: replayEvents
      summary: Re-evaluate audit snapshots with overridden rules (optional paired trace_ids)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, rules_override]
              properties:
                tenant_id: { type: string }
                limit:
                  type: integer
                  default: 100
                  description: Recent audits when trace_ids omitted
                trace_ids:
                  type: array
                  maxItems: 200
                  items: { type: string, format: uuid }
                  description: When set, replay these traces in order; limit ignored for selection
                rules_override:
                  type: array
                  items:
                    type: object
                    properties:
                      id: { type: string }
                      when:
                        type: array
                        items:
                          type: object
                          properties:
                            field: { type: string }
                            op: { type: string }
                            value: {}
                      tags:
                        type: array
                        items: { type: string }
                      score_delta: { type: number }
                      description: { type: string }
      responses:
        "200":
          description: Replay comparison per audit row
          content:
            application/json:
              schema:
                type: object
                properties:
                  tenant_id: { type: string }
                  events_evaluated: { type: integer }
                  decisions_changed: { type: integer }
                  missing_trace_ids:
                    type: array
                    items: { type: string, format: uuid }
                  results:
                    type: array
                    items: { type: object, additionalProperties: true }
        "400":
          description: Invalid request
        "404":
          description: No audit rows matched
components:
  schemas:
    EvaluateRequest:
      type: object
      required: [tenant_id, event_type, entity_id, payload]
      properties:
        tenant_id:
          type: string
        event_type:
          type: string
          description: e.g. login, payment, signup, device, session
          enum: [login, payment, signup, device, session, custom]
        entity_id:
          type: string
        session_id:
          type: string
          nullable: true
        payload:
          type: object
          additionalProperties: true
        device_context:
          type: object
          nullable: true
          description: Device signals and attestation from SDK
          properties:
            device_id: { type: string }
            platform: { type: string, enum: [web, android, ios, server] }
            signals: { type: object, additionalProperties: true }
            attestation:
              type: object
              nullable: true
              properties:
                nonce: { type: string }
                token: { type: string }
                provider: { type: string }
        metadata:
          type: object
          additionalProperties: true
        challenge_policy_id:
          type: string
          nullable: true
          description: Optional challenge/escalation template id (JSON files under rules/challenge_policies/)
    EvaluateResponse:
      type: object
      required: [trace_id, decision, score, tags, inference_context]
      properties:
        trace_id:
          type: string
          format: uuid
        decision:
          type: string
          enum: [allow, review, deny]
        score:
          type: number
          format: float
          minimum: 0
          maximum: 100
        tags:
          type: array
          items:
            type: string
        rule_hits:
          type: array
          items:
            type: string
        reasons:
          type: array
          items:
            type: string
        ml_score:
          type: number
          format: float
          nullable: true
        inference_context:
          $ref: "#/components/schemas/InferenceContext"
        recommended_action:
          type: string
          nullable: true
          description: Client hint for step-up (e.g. step_up_mfa, step_up_attestation, manual_review, block)
        challenge_policy_id:
          type: string
          nullable: true
          description: Resolved challenge template id applied to this response
        challenge_metadata:
          type: object
          nullable: true
          additionalProperties: true
          description: Matched rule id, escalation ladder, rule index (audit-friendly)
    InferenceContext:
      type: object
      required:
        - schema_version
        - integrity_confidence
        - tamper_risk
        - network_trust
        - replay_risk
        - geo_consistency_risk
        - top_signals
        - confidence_tier
        - driver_reasons
        - colocation_risk
        - impossible_travel_risk
        - velocity_events_5m
        - velocity_events_1h
        - velocity_events_24h
      properties:
        schema_version:
          type: string
          example: "2"
        integrity_confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        tamper_risk:
          type: number
          format: float
          minimum: 0
          maximum: 1
        network_trust:
          type: number
          format: float
          minimum: 0
          maximum: 1
        replay_risk:
          type: number
          format: float
          minimum: 0
          maximum: 1
        geo_consistency_risk:
          type: number
          format: float
          minimum: 0
          maximum: 1
        top_signals:
          type: array
          items:
            type: string
        confidence_tier:
          type: string
          enum: [low, medium, high]
        driver_reasons:
          type: array
          items:
            type: string
          description: Analyst-oriented codes for top decision drivers
        colocation_risk:
          type: number
          format: float
          minimum: 0
          maximum: 1
        impossible_travel_risk:
          type: number
          format: float
          minimum: 0
          maximum: 1
        velocity_events_5m:
          type: integer
          minimum: 0
        velocity_events_1h:
          type: integer
          minimum: 0
        velocity_events_24h:
          type: integer
          minimum: 0
        ml_top_factors:
          type: array
          description: Ranked ML explanation factors from ml-scoring (v1.2+); optional TreeSHAP when enabled server-side
          items:
            type: object
            required: [code, description, impact]
            properties:
              code: { type: string }
              description: { type: string }
              impact: { type: string }
        ml_summary:
          type: string
          nullable: true
          description: Plain-language ML line for analysts (paired with ml_top_factors)
        ml_model:
          type: string
          nullable: true
          description: ml-scoring model label (e.g. heuristic-v1+onnx)
