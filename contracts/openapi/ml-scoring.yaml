openapi: 3.1.0
info:
  title: Tarka ML Scoring Service
  version: 1.0.0
servers:
  - url: http://localhost:8005
paths:
  /v1/health:
    get:
      operationId: mlHealth
      responses:
        "200":
          description: OK
  /v1/score:
    post:
      operationId: score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, entity_id, features]
              properties:
                tenant_id: { type: string }
                entity_id: { type: string }
                event_type: { type: string }
                features:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  score: { type: number, format: float }
                  model_version: { type: string }
