openapi: 3.1.0
info:
  title: Tarka ML Scoring Service
  version: 1.0.0
servers:
  - url: http://localhost:8005
paths:
  /v1/health:
    get:
      operationId: mlHealth
      responses:
        "200":
          description: OK
  /v1/promotion-policy:
    get:
      operationId: mlPromotionPolicyGet
      summary: Active ML promotion gate policy (OSS #37 / #52)
      responses:
        "200":
          description: Policy bundle
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/models/{name}/{version}/promotion-check:
    get:
      operationId: mlPromotionCheck
      summary: Dry-run promotion gate for a model version (report artifact)
      parameters:
        - name: name
          in: path
          required: true
          schema: { type: string }
        - name: version
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Gate result and report
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "404":
          description: Unknown model version
  /v1/score:
    post:
      operationId: score
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, entity_id, features]
              properties:
                tenant_id: { type: string }
                entity_id: { type: string }
                event_type: { type: string }
                features:
                  type: object
                  additionalProperties: true
      responses:
        "200":
          description: Model score and version
          content:
            application/json:
              schema:
                type: object
                properties:
                  score: { type: number, format: float }
                  model_version: { type: string }
