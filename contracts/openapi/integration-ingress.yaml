openapi: 3.1.0
info:
  title: Tarka Integration Ingress
  version: 1.0.0
  description: Webhooks, adapter orchestration, and integration reliability surfaces.
servers:
  - url: http://localhost:8003
paths:
  /v1/health:
    get:
      operationId: ingressHealth
      responses:
        "200":
          description: OK
  /v1/slo:
    get:
      operationId: ingressSlo
      responses:
        "200":
          description: SLO and runtime posture
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SloStatusResponse"
  /v1/vault/kms:
    get:
      operationId: vaultKmsStatus
      responses:
        "200":
          description: KMS provider and configuration status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultKmsStatusResponse"
  /v1/vault/kms/self-check:
    get:
      operationId: vaultKmsSelfCheck
      responses:
        "200":
          description: KMS round-trip self-check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultKmsSelfCheckResponse"
  /v1/vault/metrics:
    get:
      operationId: vaultMetrics
      responses:
        "200":
          description: Vault/KMS counters
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
  /v1/vault/rotation-jobs:
    get:
      operationId: vaultRotationJobs
      responses:
        "200":
          description: Recent KMS rotation jobs
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobs:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
  /v1/integrations/readiness:
    get:
      operationId: integrationsReadiness
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Category coverage readiness score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationsReadinessResponse"
  /v1/integrations/health-matrix:
    get:
      operationId: integrationsHealthMatrix
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Point-in-time provider health rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationsHealthMatrixResponse"
  /v1/integrations/scorecards:
    get:
      operationId: integrationsScorecards
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema: { type: string }
      responses:
        "200":
          description: API-first reliability scorecards for installed providers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationsScorecardsResponse"
  /v1/integrations/test-connectivity:
    post:
      operationId: testIntegrationConnectivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntegrationTestRequest"
      responses:
        "200":
          description: Connectivity result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntegrationConnectivityResult"
        "404":
          description: Unknown provider
  /v1/integrations/preflight-probes:
    post:
      operationId: preflightIntegrationProbes
      summary: Run public doc URL probes for catalog providers (no tenant credentials)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreflightProbesRequest"
      responses:
        "200":
          description: Per-provider probe results and connector_quality v1
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreflightProbesResponse"
  /v1/integrations/catalog:
    get:
      operationId: integrationsCatalog
      responses:
        "200":
          description: Provider catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  connector_quality_version: { type: integer }
                  total_providers: { type: integer }
                  categories:
                    type: array
                    items: { type: string }
                  providers:
                    type: array
                    items:
                      type: object
                      additionalProperties: true
                      properties:
                        swimlane_module: { type: string }
                        github_project_view_url: { type: string, format: uri }
  /v1/webhooks/kyc/{provider}:
    post:
      operationId: kycWebhook
      parameters:
        - name: provider
          in: path
          required: true
          schema: { type: string }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Accepted and normalized when adapter available
          content:
            application/json:
              schema:
                type: object
                properties:
                  event_id: { type: string }
                  provider: { type: string }
                  accepted: { type: boolean }
                  normalized: { type: boolean }
  /v1/kyc/verify:
    post:
      operationId: verifyIdentity
      summary: Invoke normalized verify (routes to configured adapter)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycVerifyRequest"
      responses:
        "200":
          description: Normalized KYC verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KycNormalizedResult"
components:
  schemas:
    SloStatusResponse:
      type: object
      properties:
        service: { type: string }
        availability_target: { type: number }
        latency_target_ms_p95: { type: number }
        error_budget_window_days: { type: integer }
        current:
          type: object
          additionalProperties: true
    VaultKmsStatusResponse:
      type: object
      properties:
        provider: { type: string }
        active_key_id: { type: string }
        rotation_enabled: { type: boolean }
        rotation_interval_seconds: { type: integer }
        config_valid: { type: boolean }
        config_issues:
          type: array
          items: { type: string }
    VaultKmsSelfCheckResponse:
      type: object
      properties:
        ok: { type: boolean }
        latency_ms: { type: number, nullable: true }
        provider: { type: string, nullable: true }
        key_id: { type: string, nullable: true }
        error: { type: string, nullable: true }
        issues:
          type: array
          nullable: true
          items: { type: string }
    IntegrationsReadinessCoverageItem:
      type: object
      required: [installed, count]
      properties:
        installed: { type: boolean }
        count: { type: integer, minimum: 0 }
    IntegrationsReadinessResponse:
      type: object
      required: [tenant_id, readiness_score, covered_categories, total_categories, coverage]
      properties:
        tenant_id: { type: string }
        readiness_score: { type: number }
        covered_categories: { type: integer }
        total_categories: { type: integer }
        coverage:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/IntegrationsReadinessCoverageItem"
    IntegrationHealthMatrixRow:
      type: object
      required: [provider_id, name, category, status, latency_ms, missing_fields]
      properties:
        provider_id: { type: string }
        name: { type: string }
        category: { type: string }
        status: { type: string, enum: [pass, fail, unknown] }
        latency_ms: { type: number }
        missing_fields:
          type: array
          items: { type: string }
    IntegrationsHealthMatrixResponse:
      type: object
      required: [tenant_id, score, rows]
      properties:
        tenant_id: { type: string }
        score: { type: number }
        rows:
          type: array
          items:
            $ref: "#/components/schemas/IntegrationHealthMatrixRow"
    ConnectorQualityV1:
      type: object
      required: [version, score, components]
      properties:
        version: { type: integer }
        score: { type: number }
        components:
          type: object
          additionalProperties: { type: number }
        probe_error: { type: string, nullable: true }
    IntegrationScorecardProvider:
      type: object
      required:
        [
          provider_id,
          category,
          status,
          connectivity_score,
          latency_ms,
          config_completeness,
          last_checked_at,
          reasons,
          provider_score,
          connector_quality,
        ]
      properties:
        provider_id: { type: string }
        category: { type: string }
        status: { type: string, enum: [healthy, degraded, down, unknown] }
        connectivity_score: { type: number }
        latency_ms: { type: number }
        config_completeness: { type: number }
        last_checked_at: { type: string, nullable: true }
        reasons:
          type: array
          items: { type: string }
        provider_score: { type: number }
        connector_quality:
          $ref: "#/components/schemas/ConnectorQualityV1"
    IntegrationsScorecardsResponse:
      type: object
      required: [tenant_id, overall_score, overall_connector_quality, providers, connector_quality_version]
      properties:
        tenant_id: { type: string }
        connector_quality_version: { type: integer }
        overall_score: { type: number }
        overall_connector_quality: { type: number }
        providers:
          type: array
          items:
            $ref: "#/components/schemas/IntegrationScorecardProvider"
    PreflightProbesRequest:
      type: object
      properties:
        provider_ids:
          type: array
          items: { type: string }
          nullable: true
    PreflightProbesResultRow:
      type: object
      required: [provider_id, live_probe, connector_quality]
      properties:
        provider_id: { type: string }
        name: { type: string }
        category: { type: string }
        swimlane_module: { type: string }
        github_project_view_url: { type: string, format: uri }
        live_probe:
          $ref: "#/components/schemas/IntegrationLiveProbe"
        connector_quality:
          $ref: "#/components/schemas/ConnectorQualityV1"
    PreflightProbesResponse:
      type: object
      required:
        [connector_quality_version, probed, probes_ok, average_connector_quality, results]
      properties:
        connector_quality_version: { type: integer }
        probed: { type: integer }
        probes_ok: { type: integer }
        average_connector_quality: { type: number }
        results:
          type: array
          items:
            $ref: "#/components/schemas/PreflightProbesResultRow"
    IntegrationTestRequest:
      type: object
      required: [tenant_id, provider_id]
      properties:
        tenant_id: { type: string }
        provider_id: { type: string }
        config:
          type: object
          nullable: true
          additionalProperties: true
    IntegrationConnectivityCheck:
      type: object
      properties:
        check: { type: string }
        passed: { type: boolean }
        accepted:
          type: array
          items: { type: string }
        missing_fields:
          type: array
          items: { type: string }
    IntegrationLiveProbe:
      type: object
      properties:
        ok: { type: boolean }
        latency_ms: { type: number }
        error: { type: string }
    IntegrationConnectivityResult:
      type: object
      required:
        [provider_id, status, checks, latency_ms, required_config_fields, missing_fields, live_probe]
      properties:
        provider_id: { type: string }
        status: { type: string, enum: [pass, fail] }
        checks:
          type: array
          items:
            $ref: "#/components/schemas/IntegrationConnectivityCheck"
        latency_ms: { type: number }
        required_config_fields:
          type: array
          items: { type: string }
        missing_fields:
          type: array
          items: { type: string }
        live_probe:
          $ref: "#/components/schemas/IntegrationLiveProbe"
    KycVerifyRequest:
      type: object
      required: [tenant_id, subject_id, adapter]
      properties:
        tenant_id: { type: string }
        subject_id: { type: string }
        adapter: { type: string }
        document:
          type: object
          properties:
            type:
              type: string
              enum: [passport, drivers_license, national_id, other]
            country: { type: string }
        raw:
          type: object
          additionalProperties: true
    KycNormalizedResult:
      type: object
      required: [status, adapter, subject_id]
      properties:
        status:
          type: string
          enum: [pending, verified, rejected, manual_review, error]
        adapter: { type: string }
        subject_id: { type: string }
        document_type:
          type: string
          nullable: true
          enum: [passport, drivers_license, national_id, other]
        liveness:
          type: string
          nullable: true
          enum: [passed, failed, skipped]
        pep_sanctions_match: { type: boolean, nullable: true }
        confidence: { type: number, minimum: 0, maximum: 1, nullable: true }
        raw_reference: { type: string, nullable: true }
        details:
          type: object
          additionalProperties: true
