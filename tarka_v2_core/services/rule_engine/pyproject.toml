[project]
name = "tarka-rule-engine"
version = "0.1.0"
description = "Transaction rule engine AST (Pydantic)."
requires-python = ">=3.11"
dependencies = [
  "pydantic>=2.13.0",
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.32.0",
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
