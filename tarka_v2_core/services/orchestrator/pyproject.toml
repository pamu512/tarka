[project]
name = "tarka-orchestrator"
version = "0.1.0"
description = "Ingestion gateway: orchestrates rule engine and downstream sidecars."
requires-python = ">=3.11"
dependencies = [
  "tarka-deploy-settings @ file:../../../packages/tarka-deploy-settings",
  "duckdb>=1.1.0",
  "pydantic>=2.13.0",
  "pydantic-settings>=2.6.0",
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.32.0",
  "httpx>=0.28.0",
  "sqlalchemy[asyncio]>=2.0.49",
  "aiosqlite>=0.21.0",
  "greenlet>=3.0.0",
  "neo4j>=5.26.0,<6",
  "reportlab>=4.2.0,<5",
  "pypdf>=5.0.0",
  "python-multipart>=0.0.9",
  "redis>=5.0.0",
]

[project.optional-dependencies]
janus = ["gremlinpython>=3.7.0"]
worker = ["nats-py>=2.7.0"]
cloud = ["clickhouse-connect>=0.7.0"]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
orchestrator = ["analytics/data/*.parquet"]

[tool.pytest.ini_options]
pythonpath = [".", "src", "../ingestor/src", "../shared", "../rule_engine/src", "../../.."]
