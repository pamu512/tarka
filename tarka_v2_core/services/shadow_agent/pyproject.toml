[project]
name = "tarka-shadow-agent"
version = "0.1.0"
description = "Shadow agent sidecar (FastAPI) + Ollama LLM client."
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.32.0",
  "httpx>=0.28.0",
  "tenacity>=9.0.0",
  "pydantic>=2.13.0",
  "sqlalchemy[asyncio]>=2.0.49",
  "aiosqlite>=0.21.0",
  "greenlet>=3.0.0",
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
