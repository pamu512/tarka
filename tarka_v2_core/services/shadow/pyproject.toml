[project]
name = "tarka-shadow"
version = "0.1.0"
description = "Shadow-side hooks and LLM tool helpers (NATS OSINT, dispute prompts)."
requires-python = ">=3.11"
dependencies = [
  "aiosqlite>=0.21.0",
  "asyncpg>=0.30.0",
  "httpx>=0.27.0",
  "nats-py>=2.7.0",
  "sqlalchemy[asyncio]>=2.0.49",
]

[project.optional-dependencies]
dev = ["pytest>=8.0.0"]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"shadow" = "."}
packages = [
  "shadow",
  "shadow.hooks",
  "shadow.inference",
  "shadow.models",
  "shadow.prompts",
  "shadow.tools",
]

[tool.pytest.ini_options]
pythonpath = [".."]
testpaths = ["tests"]
