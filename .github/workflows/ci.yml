        run: pip install -e ".[dev]"
        working-directory: legacy_attic/services/legacy_v1_decision_api
      - name: Run tests (inference, replay, evaluate path, consortium, rules)
        run: >
          pytest
          --cov=decision_api
          --cov-report=xml
          --cov-report=term-missing
          --cov-fail-under=48
          tests/
        working-directory: legacy_attic/services/legacy_v1_decision_api
        env:
          PYTHONPATH: src:../shared
          DATABASE_URL: sqlite+aiosqlite:///
          REDIS_URL: redis://localhost:6379/0
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-decision-api
          path: legacy_attic/services/legacy_v1_decision_api/coverage.xml
          if-no-files-found: ignore
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: legacy_attic/services/legacy_v1_decision_api/coverage.xml
          flags: decision-api
          fail_ci_if_error: false

