name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .
      - name: Block vendor IDE tokens in tracked sources
        run: |
          python << 'PY'
          import subprocess, sys
          tokens = ("C" + "ursor", "A" + "nysphere")
          for token in tokens:
              r = subprocess.run(
                  ["git", "grep", "-nF", token, "--", "."],
                  capture_output=True,
                  text=True,
              )
              if r.returncode == 0:
                  print(r.stdout, end="")
                  print("Remove vendor-specific editor references (see CONTRIBUTING.md).", file=sys.stderr)
                  sys.exit(1)
              if r.returncode not in (0, 1):
                  sys.exit(r.returncode)
          PY

  test-decision-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/decision-api/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/decision-api
      - name: Run tests (inference, replay, evaluate path, consortium, rules)
        run: >
          pytest
          --cov=decision_api
          --cov-report=xml
          --cov-report=term-missing
          --cov-fail-under=45
          tests/
        working-directory: services/decision-api
        env:
          PYTHONPATH: src:../shared
          DATABASE_URL: sqlite+aiosqlite:///
          REDIS_URL: redis://localhost:6379/0
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-decision-api
          path: services/decision-api/coverage.xml
          if-no-files-found: ignore

  test-case-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/case-api/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/case-api
      - name: Run tests
        run: pytest --cov=case_api --cov-report=xml --cov-report=term-missing --cov-fail-under=40 tests/
        working-directory: services/case-api
        env:
          PYTHONPATH: src:../shared
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-case-api
          path: services/case-api/coverage.xml
          if-no-files-found: ignore

  test-graph-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/graph-service/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/graph-service
      - name: Run tests (algorithms + Neo4j driver mocks)
        run: pytest --cov=graph_service --cov-report=xml --cov-report=term-missing --cov-fail-under=26 tests/
        working-directory: services/graph-service
        env:
          PYTHONPATH: src
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-graph-service
          path: services/graph-service/coverage.xml
          if-no-files-found: ignore

  test-graph-neo4j-live:
    runs-on: ubuntu-latest
    services:
      neo4j:
        image: neo4j:5-community
        ports:
          - 7687:7687
        env:
          NEO4J_AUTH: neo4j/graphcipass2026
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/graph-service/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/graph-service
      - name: Wait for Neo4j Bolt
        run: |
          python <<'PY'
          import time
          from neo4j import GraphDatabase
          # Job runs on the VM (not a job container): reach the service via mapped localhost.
          uri = "bolt://127.0.0.1:7687"
          auth = ("neo4j", "graphcipass2026")
          for i in range(45):
              try:
                  d = GraphDatabase.driver(uri, auth=auth)
                  d.verify_connectivity()
                  d.close()
                  print("neo4j ready")
                  break
              except Exception:
                  time.sleep(2)
          else:
              raise SystemExit("Neo4j did not become ready in time")
          PY
      - name: Run Neo4j integration tests
        run: pytest -v tests/test_neo4j_integration.py
        working-directory: services/graph-service
        env:
          PYTHONPATH: src
          NEO4J_INTEGRATION: "1"
          NEO4J_URI: bolt://127.0.0.1:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: graphcipass2026

  test-integration-ingress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/integration-ingress/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/integration-ingress
      - name: Run tests (OSINT parallel enrichment, KMS stubs)
        run: pytest --cov=integration_ingress --cov-report=xml --cov-report=term-missing --cov-fail-under=35 tests/
        working-directory: services/integration-ingress
        env:
          PYTHONPATH: src:../shared
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-integration-ingress
          path: services/integration-ingress/coverage.xml
          if-no-files-found: ignore

  test-investigation-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/investigation-agent/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/investigation-agent
      - name: Run tests
        run: pytest --cov=investigation_agent --cov-report=xml --cov-report=term-missing --cov-fail-under=52 tests/
        working-directory: services/investigation-agent
        env:
          PYTHONPATH: src:../shared
      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-investigation-agent
          path: services/investigation-agent/coverage.xml
          if-no-files-found: ignore

  test-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/fraud-sdk-python/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: packages/fraud-sdk-python
      - name: Run tests
        run: pytest --cov=fraud_stack_sdk --cov-report=xml --cov-report=term-missing --cov-fail-under=48 tests/
        working-directory: packages/fraud-sdk-python
        env:
          PYTHONPATH: src

  build-frontend:
    runs-on: ubuntu-latest
    env:
      # Deterministic Vite/tsc memory on CI runners (avoids flaky OOM on `vite build`).
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  build-sdk-typescript:
    runs-on: ubuntu-latest
    env:
      NODE_OPTIONS: --max-old-space-size=4096
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: packages/fraud-sdk-typescript/package-lock.json
      - run: npm ci
        working-directory: packages/fraud-sdk-typescript
      - run: npm run build
        working-directory: packages/fraud-sdk-typescript

  test-graphql-gateway:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/graphql-gateway/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/graphql-gateway
      - name: Run tests
        run: pytest --cov=graphql_gateway --cov-report=xml --cov-report=term-missing --cov-fail-under=72 tests/
        working-directory: services/graphql-gateway
        env:
          PYTHONPATH: src:../shared

  test-event-ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/event-ingest/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/event-ingest
      - name: Run tests
        run: pytest --cov=event_ingest --cov-report=xml --cov-report=term-missing --cov-fail-under=66 tests/
        working-directory: services/event-ingest
        env:
          PYTHONPATH: src:../shared

  test-analytics-sink:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/analytics-sink/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/analytics-sink
      - name: Run tests
        run: pytest --cov=analytics_sink --cov-report=xml --cov-report=term-missing --cov-fail-under=62 tests/
        working-directory: services/analytics-sink
        env:
          PYTHONPATH: src:../shared

  test-feature-service:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/feature-service/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/feature-service
      - name: Run tests
        run: pytest --cov=feature_service --cov-report=xml --cov-report=term-missing --cov-fail-under=49 tests/
        working-directory: services/feature-service
        env:
          PYTHONPATH: src:../shared

  test-ml-scoring:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/ml-scoring/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/ml-scoring
      - name: Run tests
        run: pytest --cov=ml_scoring --cov-report=xml --cov-report=term-missing --cov-fail-under=64 tests/
        working-directory: services/ml-scoring
        env:
          PYTHONPATH: src:../shared

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-decision-api
      - test-case-api
      - test-graph-service
      - test-graph-neo4j-live
      - test-integration-ingress
      - test-investigation-agent
      - test-sdk
      - build-frontend
      - build-sdk-typescript
      - test-graphql-gateway
      - test-event-ingest
      - test-analytics-sink
      - test-feature-service
      - test-ml-scoring
    strategy:
      fail-fast: false
      matrix:
        service:
          - decision-api
          - graph-service
          - case-api
          - ml-scoring
          - feature-service
          - investigation-agent
          - integration-ingress
          - event-ingest
          - analytics-sink
          - graphql-gateway
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.0.0
      - uses: docker/build-push-action@v7.0.0
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: tarka/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # End-to-end: build and start every service in deploy/docker-compose.yml (--profile full),
  # wait for health + POST /v1/decisions/evaluate, then tear down (see scripts/ci/full_stack_smoke.py).
  stack-smoke:
    runs-on: ubuntu-latest
    needs:
      - docker-build
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.0.0
      - name: Full stack smoke (Docker Compose profile full)
        env:
          DOCKER_BUILDKIT: "1"
        run: python3 scripts/ci/full_stack_smoke.py --wait-seconds 1200
