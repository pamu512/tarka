      - test-data-plane
      - test-chitragupta
      - test-feature-service
      - test-ml-scoring
      - benchmark-latency-evaluate
    strategy:
      fail-fast: false
      matrix:
        service:
          - core-api
          - signal-api
          - graph-service
          - investigation-agent
          - integration-ingress
          - data-plane
          - graphql-gateway
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v4.0.0
      - uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: legacy_attic/services/${{ matrix.service }}/Dockerfile
          push: false
          tags: tarka/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # End-to-end: build and start every service in deploy/docker-compose.yml (--profile full),
  # wait for health + POST /v1/decisions/evaluate, then tear down (see scripts/ci/full_stack_smoke.py).
  stack-smoke:
    runs-on: ubuntu-latest
    needs:
      - docker-build
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: docker/setup-buildx-action@v4.0.0
      - name: Full stack smoke (Docker Compose profile full)
        env:
          DOCKER_BUILDKIT: "1"
        run: python3 scripts/ci/full_stack_smoke.py --wait-seconds 1200
      - name: Service contract tests
        run: python3 scripts/ci/test_service_contracts.py
      - name: Traceparent propagation smoke (decision/case/investigation-agent)
        run: python3 scripts/ci/traceparent_smoke.py

  cloud-preset-smoke:
    needs: audit-stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Helm lint
        run: helm lint deploy/helm/fraud-stack
      - name: Helm template (default values)
        run: helm template tarka deploy/helm/fraud-stack -f deploy/helm/fraud-stack/values.yaml >/tmp/tarka-default.yaml
      - name: Validate cloud preset generation
        run: python3 scripts/ci/cloud_preset_smoke.py
      - name: Helm template (generated core-on-aws preset)
        run: |
          python3 scripts/deploy/generate_cloud_values.py \
            --preset core-on-aws \
            --image-registry registry.example.com/tarka \
            --db-url 'postgresql+asyncpg://fraud:pw@db.internal:5432/fraud' \
            --redis-url 'redis://redis.internal:6379/0' \
            --output /tmp/core-on-aws.values.yaml
          helm template tarka deploy/helm/fraud-stack -f /tmp/core-on-aws.values.yaml >/tmp/tarka-core-aws.yaml
