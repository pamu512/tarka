name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check .

  test-decision-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/decision-api/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/decision-api
      - name: Run tests
        run: pytest --cov=decision_api --cov-report=xml --cov-report=term-missing tests/
        working-directory: services/decision-api
        env:
          PYTHONPATH: src:../shared

  test-case-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/case-api/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: services/case-api
      - name: Run tests
        run: pytest --cov=case_api --cov-report=xml --cov-report=term-missing tests/
        working-directory: services/case-api
        env:
          PYTHONPATH: src:../shared

  test-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: packages/fraud-sdk-python/pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
        working-directory: packages/fraud-sdk-python
      - name: Run tests
        run: pytest --cov=fraud_stack_sdk --cov-report=xml --cov-report=term-missing tests/
        working-directory: packages/fraud-sdk-python
        env:
          PYTHONPATH: src

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        service:
          - decision-api
          - graph-service
          - case-api
          - ml-scoring
          - feature-service
          - investigation-agent
          - integration-ingress
          - event-ingest
          - analytics-sink
          - graphql-gateway
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: tarka/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
