  benchmark-latency-evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: docker/setup-buildx-action@v4.0.0
      - name: Start lite stack for benchmark
        run: docker compose -f deploy/docker-compose.lite.yml up -d --build
      - name: Wait for decision-api health
        run: |
          python3 - <<'PY'
          import json, time, urllib.request
          url = "http://127.0.0.1:8000/v1/health"
          for _ in range(120):
              try:
                  with urllib.request.urlopen(url, timeout=3) as r:
                      body = json.loads(r.read().decode())
                      if r.status == 200 and body.get("status") == "ok":
                          print("decision-api ready")
                          raise SystemExit(0)
              except Exception:
                  pass
              time.sleep(2)
          raise SystemExit("decision-api did not become ready")
          PY
      - name: Run latency benchmark and capture output
        run: |
          python3 scripts/benchmarks/latency_evaluate.py \
            --url http://127.0.0.1:8000 \
            --requests 300 \
            --concurrency 30 \
            --warmup 20 | tee benchmark-latency-evaluate.txt
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-latency-evaluate
          path: benchmark-latency-evaluate.txt
          if-no-files-found: error
      - name: Tear down stack
        if: always()
        run: docker compose -f deploy/docker-compose.lite.yml down -v --remove-orphans

  docker-build:
    runs-on: ubuntu-latest
    needs:
      - lint
      - test-decision-api
      - test-case-api
      - test-graph-service
      - test-graph-neo4j-live
      - test-integration-ingress
      - test-investigation-agent
      - test-investigation-agent-golden-matrix
      - test-sdk
      - build-frontend
      - build-sdk-typescript
      - test-graphql-gateway
      - test-event-ingest
      - test-collaboration-chat-bridge
      - test-analytics-sink
      - test-chitragupta
      - test-feature-service
      - test-ml-scoring
      - benchmark-latency-evaluate
    strategy:
      fail-fast: false
      matrix:
        service:
          - decision-api
          - graph-service
          - case-api
          - ml-scoring
          - feature-service
          - investigation-agent
          - integration-ingress
          - event-ingest
          - collaboration-chat-bridge
          - analytics-sink
          - graphql-gateway
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.0.0
      - uses: docker/build-push-action@v7.1.0
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: tarka/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # End-to-end: build and start every service in deploy/docker-compose.yml (--profile full),
  # wait for health + POST /v1/decisions/evaluate, then tear down (see scripts/ci/full_stack_smoke.py).
  stack-smoke:
    runs-on: ubuntu-latest
    needs:
      - docker-build
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4.0.0
      - name: Full stack smoke (Docker Compose profile full)
        env:
          DOCKER_BUILDKIT: "1"
        run: python3 scripts/ci/full_stack_smoke.py --wait-seconds 1200
