# Optional: set repository secret CODECOV_TOKEN for https://codecov.io PR coverage comments.
# Upload steps use continue-on-error so CI stays green without a token.
name: CI

# Shared auth fails closed when API_KEYS and OIDC are unset. Do not set non-empty API_KEYS here:
# configured keys require X-API-Key on every request; pytest TestClient calls usually omit it.
# Insecure dev mode lets tests reach route handlers without headers (see per-service conftests).
# Force empty keys/issuer so org/repo env cannot preconfigure auth and cause 401 in unit tests.
env:
  ALLOW_INSECURE_NO_AUTH: "true"
  API_KEYS: ""
  OIDC_ISSUER: ""

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Tier-1 Honesty: AST-only gate (stdlib). All test / lint jobs `need` this so nothing runs until it passes.
  audit-stubs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Tier-1 Honesty gate — no stub APIs or empty implementations (AST)
        run: python3 scripts/audit_stubs.py
      - name: Tier-1 Honesty gate — audit_stubs self-test (stdlib unittest)
        run: python3 scripts/ci/test_audit_stubs.py
      - name: No legacy wire protobuf split-brain (grep gate)
        run: python3 scripts/ci/test_no_legacy_imports.py

  lint:
    needs: audit-stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check .
      - run: ruff format --check legacy_attic/services/
      - name: Enforce Python import style consistency
        run: python scripts/ci/check_import_style_consistency.py
      - name: Demo vertical contract unit tests (stdlib)
        run: python3 scripts/ci/test_demo_vertical_contracts.py
      - name: Validate JSON rule packs (policy-as-code gate)
        run: python scripts/policy/validate_rule_packs.py
      - name: Validate typology DSL + predicate registry (OSS #46)
        run: python scripts/policy/validate_typology_dsl.py
      - name: Validate OpenAPI contracts (contracts/openapi)
        run: |
          pip install pyyaml openapi-spec-validator
          python scripts/ci/validate_openapi_yaml.py
      - name: Validate ML signal catalogs vs heuristic FEATURE_ORDER
        run: python scripts/ml/validate_signal_catalogs.py
      - name: ML promotion policy YAML/JSON sync + metadata (OSS #37 / #52)
        run: |
          pip install pyyaml
          python scripts/ml/validate_ml_promotion_policy.py --check-sync --strict
      - name: Block vendor IDE tokens in tracked sources
        run: |
          python << 'PY'
          import subprocess, sys
          tokens = ("C" + "ursor", "A" + "nysphere")
          for token in tokens:
              r = subprocess.run(
                  [
                      "git",
                      "grep",
                      "-nFI",
                      token,
                      "--",
                      ".",
                      ":(exclude).github/workflows/ci.yml",
                      ":(exclude)**/target",
                  ],
                  capture_output=True,
                  text=True,
              )
              if r.returncode == 0:
                  print(r.stdout, end="")
                  print("Remove vendor-specific editor references (see CONTRIBUTING.md).", file=sys.stderr)
                  sys.exit(1)
              if r.returncode not in (0, 1):
                  sys.exit(r.returncode)
          PY

  test-decision-api:
    needs: audit-stubs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: legacy_attic/services/legacy_v1_decision_api/pyproject.toml
