Optional: set repository secret CODECOV_TOKEN for https://codecov.io PR coverage comments.

Upload steps use continue-on-error so CI stays green without a token.

name: CI

env:
ALLOW_INSECURE_NO_AUTH: "true"
API_KEYS: ""
OIDC_ISSUER: ""

on:
push:
branches: [main, master]
pull_request:
branches: [main, master]

concurrency:
group: ${{ github.workflow }}-${{ github.ref }}
cancel-in-progress: true

permissions:
contents: read

jobs:

Tier-1 Honesty: AST-only gate (stdlib).

audit-stubs:
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v5
with:
python-version: "3.12"
- name: Tier-1 Honesty gate — no stub APIs or empty implementations (AST)
run: python3 scripts/audit_stubs.py
- name: Tier-1 Hardening gate — Block legacy imports in core zones
run: python3 scripts/ci/test_no_legacy_imports.py
- name: Tier-1 Honesty gate — audit_stubs self-test (stdlib unittest)
run: python3 scripts/ci/test_audit_stubs.py

lint:
needs: audit-stubs
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: actions/setup-python@v5
with:
python-version: "3.12"
- run: pip install ruff
- run: ruff check .
- run: ruff format --check .
- name: Enforce Python import style consistency
run: python scripts/ci/check_import_style_consistency.py
- name: Block vendor IDE tokens in tracked sources
run: |
python << 'PY'
import subprocess, sys
tokens = ("C" + "ursor", "A" + "nysphere")
for token in tokens:
r = subprocess.run(
["git", "grep", "-nF", token, "--", ".", ":(exclude).github/workflows/ci.yml"],
capture_output=True,
text=True,
)
if r.returncode == 0:
print(r.stdout, end="")
print("Remove vendor-specific editor references.", file=sys.stderr)
sys.exit(1)
PY

test-decision-api:
needs: audit-stubs
runs-on: ubuntu-latest
steps:
- uses: actions/checkout@v4
- uses: dtolnay/rust-toolchain@stable
- uses: actions/setup-python@v5
with:
python-version: "3.12"
cache: pip
cache-dependency-path: services/decision-api/pyproject.toml
- name: Generate Protos
run: bash scripts/generate_protos.sh
- name: Build Rust rule engine (PyO3)
run: |
pip install "maturin>=1.7,<2.0"
cd services/rule-engine && maturin develop --release
- name: Install dependencies
run: pip install -e ".[dev]"
working-directory: services/decision-api
- name: Run tests
run: >
pytest
--cov=decision_api
--cov-report=xml
--cov-fail-under=48
tests/
working-directory: services/decision-api
env:
PYTHONPATH: src:../shared
DATABASE_URL: sqlite+aiosqlite:///
REDIS_URL: redis://localhost:6379/0

docker-build:
runs-on: ubuntu-latest
needs: [audit-stubs, lint, test-decision-api]
strategy:
fail-fast: false
matrix:
service: [core-api, signal-api, graph-service, investigation-agent]
steps:
- uses: actions/checkout@v4
- uses: docker/setup-buildx-action@v3
- uses: docker/build-push-action@v5
with:
context: .
file: services/${{ matrix.service }}/Dockerfile
push: false
tags: tarka/${{ matrix.service }}:${{ github.sha }}
cache-from: type=gha,scope=${{ matrix.service }}
cache-to: type=gha,mode=max,scope=${{ matrix.service }}
