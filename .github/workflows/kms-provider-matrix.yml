name: KMS Provider Matrix Smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "services/integration-ingress/**"
      - ".github/workflows/kms-provider-matrix.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [local, aws, gcp, azure]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install integration-ingress
        run: |
          python -m pip install --upgrade pip
          pip install -e services/integration-ingress
      - name: Provider config smoke
        env:
          KMS_PROVIDER: ${{ matrix.provider }}
          KMS_ACTIVE_KEY_ID: test-key
          AWS_KMS_REGION: us-east-1
          GCP_KMS_KEY_RESOURCE: projects/p/locations/l/keyRings/r/cryptoKeys/k
          AZURE_KEY_VAULT_URL: https://example.vault.azure.net/
          AZURE_KMS_KEY_NAME: key1
        run: |
          python - <<'PY'
          import os
          p = os.environ["KMS_PROVIDER"]
          if p == "aws":
              assert os.environ.get("AWS_KMS_REGION")
          elif p == "gcp":
              assert "/cryptoKeys/" in os.environ.get("GCP_KMS_KEY_RESOURCE","")
          elif p == "azure":
              assert os.environ.get("AZURE_KEY_VAULT_URL")
              assert os.environ.get("AZURE_KMS_KEY_NAME")
          print("kms provider config smoke ok:", p)
          PY
