name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "30 2 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-java-kotlin:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    # Only run when the repository contains a top-level Java build project.
    if: ${{ hashFiles('**/settings.gradle', '**/settings.gradle.kts', '**/pom.xml', '**/build.xml') != '' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build Java/Kotlin project (manual)
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew build --no-daemon
          elif [ -f "./mvnw" ]; then
            ./mvnw -B -DskipTests package
          elif [ -f "pom.xml" ]; then
            mvn -B -DskipTests package
          elif [ -f "build.xml" ]; then
            ant -noinput
          else
            echo "No top-level Gradle/Maven/Ant project found."
            exit 1
          fi

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"

  analyze-swift:
    name: Analyze (swift)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      - name: Build Swift package
        run: swift build --package-path packages/fraud-sdk-ios

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"

  analyze-python:
    name: Analyze (python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
