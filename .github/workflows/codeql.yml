name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "30 2 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-swift:
    name: Analyze (swift)
    runs-on: macos-latest
    if: hashFiles('packages/fraud-sdk-ios/Package.swift') != ''
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      # iOS-only SPM: plain `swift build` targets macOS and fails; xcodebuild needs a resolvable scheme.
      # Cross-compile for the simulator so CodeQL sees a full compile of UIKit/DeviceCheck code.
      - name: Build Swift package (iOS Simulator)
        working-directory: packages/fraud-sdk-ios
        run: |
          set -euo pipefail
          xcodebuild -version
          SIM_SDK="$(xcrun --sdk iphonesimulator --show-sdk-path)"
          echo "iphonesimulator SDK: $SIM_SDK"
          if swift build -v \
            -Xswiftc "-sdk" -Xswiftc "$SIM_SDK" \
            -Xswiftc "-target" -Xswiftc "arm64-apple-ios15.0-simulator"; then
            exit 0
          fi
          echo "swift build failed; trying xcodebuild..."
          xcodebuild build \
            -scheme FraudStackSDK \
            -destination "generic/platform=iOS Simulator" \
            -sdk iphonesimulator \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"

  analyze-python:
    name: Analyze (python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:python"
