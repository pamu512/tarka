name: CodeQL

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "30 2 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  detect-java-build:
    name: Detect Java/Kotlin Build Project
    runs-on: ubuntu-latest
    outputs:
      has_top_level_build: ${{ steps.detect.outputs.has_top_level_build }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Detect top-level Java build files
        id: detect
        run: |
          if [ -f "./gradlew" ] || [ -f "./settings.gradle" ] || [ -f "./settings.gradle.kts" ] || [ -f "./pom.xml" ] || [ -f "./build.xml" ]; then
            echo "has_top_level_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_top_level_build=false" >> "$GITHUB_OUTPUT"
          fi

  analyze-java-kotlin:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-latest
    needs: detect-java-build
    if: ${{ needs.detect-java-build.outputs.has_top_level_build == 'true' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      - name: Build Java/Kotlin project (manual)
        run: |
          if [ -f "./gradlew" ]; then
            ./gradlew build --no-daemon
          elif [ -f "./mvnw" ]; then
            ./mvnw -B -DskipTests package
          elif [ -f "pom.xml" ]; then
            mvn -B -DskipTests package
          elif [ -f "build.xml" ]; then
            ant -noinput
          else
            echo "No top-level Gradle/Maven/Ant project found."
            exit 1
          fi

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"

  analyze-swift:
    name: Analyze (swift)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      - name: Build Swift package for iOS simulator (manual)
        working-directory: packages/fraud-sdk-ios
        run: |
          xcodebuild \
            -scheme FraudStackSDK \
            -destination "generic/platform=iOS Simulator" \
            -sdk iphonesimulator \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"

  analyze-python:
    name: Analyze (python)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
