# CodeQL Advanced — matrix per language. Tarka: no root Java/Kotlin; Swift SPM is iOS-only (manual simulator build).
# See https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning/customizing-your-advanced-setup-for-code-scanning
name: "CodeQL Advanced"

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "16 6 * * 1"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ${{ (matrix.language == 'swift' && 'macos-latest') || 'ubuntu-latest' }}
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none
          - language: python
            build-mode: none
          - language: swift
            build-mode: manual
          # java-kotlin omitted: no Gradle/Maven/Ant at repo root; autobuild always failed.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build Swift package (iOS Simulator)
        if: matrix.language == 'swift' && matrix.build-mode == 'manual'
        working-directory: packages/fraud-sdk-ios
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild -version
          SIM_SDK="$(xcrun --sdk iphonesimulator --show-sdk-path)"
          echo "iphonesimulator SDK: $SIM_SDK"
          if swift build -v \
            -Xswiftc "-sdk" -Xswiftc "$SIM_SDK" \
            -Xswiftc "-target" -Xswiftc "arm64-apple-ios15.0-simulator"; then
            exit 0
          fi
          echo "swift build failed; trying xcodebuild..."
          xcodebuild build \
            -scheme FraudStackSDK \
            -destination "generic/platform=iOS Simulator" \
            -sdk iphonesimulator \
            -derivedDataPath "$RUNNER_TEMP/DerivedData" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="-" \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
