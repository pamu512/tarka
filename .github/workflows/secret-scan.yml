name: Secret scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: {}
  schedule:
    - cron: "31 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  trufflehog:
    name: TruffleHog filesystem
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # Omit base/head so the action sets them from the event (push before/after, PR base/head).
      # Passing default_branch + HEAD makes both rev-parse to the same commit on default-branch pushes.
      # Only verified secrets fail the job. Unverified hits include compose defaults,
      # .env.example placeholders, and Rust crate binaries (false positives / noise).
      - name: Run TruffleHog scan
        uses: trufflesecurity/trufflehog@v3.88.18
        with:
          path: ./
          extra_args: --only-verified --json
