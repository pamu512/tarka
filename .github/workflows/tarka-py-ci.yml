# Build the tarka-py PyO3 extension with maturin and run Rust/Python integrity parity tests.
name: tarka-py CI

on:
  push:
    branches: [main, master]
    paths:
      - "crates/tarka-py/**"
      - "crates/tarka-core/**"
      - "proto/**"
      - ".github/workflows/tarka-py-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "crates/tarka-py/**"
      - "crates/tarka-core/**"
      - "proto/**"
      - ".github/workflows/tarka-py-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  maturin-and-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: crates/tarka-py/pyproject.toml

      - name: Cache Cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Install maturin
        run: pip install --upgrade pip maturin

      - name: Build native extension (maturin develop, includes dev extras)
        run: maturin develop --extras dev -v
        working-directory: crates/tarka-py

      - name: Verify Proto Codegen
        run: |
          bash scripts/generate_protos.sh
          git diff --exit-code -- crates/tarka-py/python

      - name: Run integrity parity pytest (fail on Parity Violation / assertion errors)
        run: pytest tests/test_integrity_parity.py -v --tb=short
        working-directory: crates/tarka-py
        env:
          PYTHONPATH: python
