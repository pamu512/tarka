name: Release Draft Scheduler

on:
  schedule:
    - cron: "15 8 * * *" # daily at 08:15 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

jobs:
  draft-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create or update scheduled draft releases
        uses: actions/github-script@v7
        with:
          script: |
            const milestones = [
              {
                version: "v1.1.0",
                date: "2026-04-30",
                title: "v1.1.0",
                notesPath: "docs/docs/releases/v1.1.0-2026-04-30.md",
              },
              {
                version: "v1.2.0",
                date: "2026-05-30",
                title: "v1.2.0",
                notesPath: "docs/docs/releases/v1.2.0-2026-05-30.md",
              },
              {
                version: "v1.3.0",
                date: "2026-06-29",
                title: "v1.3.0",
                notesPath: "docs/docs/releases/v1.3.0-2026-06-29.md",
              },
            ];

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const defaultBranch = context.payload.repository?.default_branch || "master";

            const today = new Date();
            const todayUtc = Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), today.getUTCDate());

            function daysUntil(targetDate) {
              const target = new Date(`${targetDate}T00:00:00Z`);
              const targetUtc = Date.UTC(target.getUTCFullYear(), target.getUTCMonth(), target.getUTCDate());
              return Math.floor((targetUtc - todayUtc) / (1000 * 60 * 60 * 24));
            }

            function plannedBody(m) {
              return `Automated draft release for scheduled milestone **${m.version}**.

            Planned release date: **${m.date}**

            Source roadmap:
            - \`docs/docs/guides/roadmap-30-60-90.md\`
            - \`${m.notesPath}\`

            ## Pre-publish checklist
            - [ ] Final QA and regression pass
            - [ ] Confirm release notes are final
            - [ ] Verify release artifacts
            - [ ] Publish on scheduled date
            `;
            }

            const existingReleases = await github.paginate(github.rest.repos.listReleases, {
              owner,
              repo,
              per_page: 100,
            });

            for (const m of milestones) {
              const d = daysUntil(m.date);
              if (d !== 1) {
                core.info(`Skipping ${m.version}; ${d} days remaining.`);
                continue;
              }

              const existing = existingReleases.find((r) => r.tag_name === m.version);
              const body = plannedBody(m);

              if (existing) {
                await github.rest.repos.updateRelease({
                  owner,
                  repo,
                  release_id: existing.id,
                  tag_name: m.version,
                  target_commitish: defaultBranch,
                  name: m.title,
                  body,
                  draft: true,
                  prerelease: false,
                });
                core.info(`Updated existing release draft for ${m.version}.`);
              } else {
                await github.rest.repos.createRelease({
                  owner,
                  repo,
                  tag_name: m.version,
                  target_commitish: defaultBranch,
                  name: m.title,
                  body,
                  draft: true,
                  prerelease: false,
                  generate_release_notes: false,
                });
                core.info(`Created release draft for ${m.version}.`);
              }
            }
