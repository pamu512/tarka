# Dependency updates (opens PRs weekly). Review Trivy + CI before merging.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /legacy_attic/services/legacy_v1_decision_api
    schedule:
      interval: weekly
    groups:
      pip-decision-api:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /legacy_attic/services/core
    schedule:
      interval: weekly
    groups:
      pip-core:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /legacy_attic/services/analytics
    schedule:
      interval: weekly
    groups:
      pip-analytics:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /legacy_attic/services/case-api
    schedule:
      interval: weekly
    groups:
      pip-case-api:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /legacy_attic/services/graph-service
    schedule:
      interval: weekly
    groups:
      pip-graph-service:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /legacy_attic/services/integration-ingress
    schedule:
      interval: weekly
    groups:
      pip-integration-ingress:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /legacy_attic/services/investigation-agent
    schedule:
      interval: weekly
    groups:
      pip-investigation-agent:
        patterns:
          - "*"

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    groups:
      npm-frontend:
        patterns:
          - "*"
