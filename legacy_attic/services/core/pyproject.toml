[project]
name = "tarka-core"
version = "0.1.0"
description = "Shared Tarka audit-plane database utilities (SQLAlchemy async, engine selection)"
requires-python = ">=3.11"
dependencies = [
  "sqlalchemy[asyncio]>=2.0.36",
  "aiosqlite>=0.20.0",
  "asyncpg>=0.30.0",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project.optional-dependencies]
dev = [
  "pytest>=8.0",
]

[tool.setuptools.packages.find]
where = ["src"]
