[project]
name = "tarka-decision-api"
version = "0.2.0"
description = "Tarka — synchronous decision API"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "sentry-sdk[fastapi]>=2.19.0",
  "structlog>=24.1.0",
  "tarka-core @ file:../core",
  "tarka-analytics @ file:../analytics",
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.32.0",
  "nats-py>=2.7.0",
  "redis[hiredis]>=5.2.0",
  "sqlalchemy[asyncio]>=2.0.36",
  "aiosqlite>=0.20.0",
  "asyncpg>=0.30.0",
  "psycopg[binary]>=3.2.0",
  "alembic>=1.14.0",
  "httpx>=0.28.0",
  "tenacity>=9.0.0",
  "pydantic-settings>=2.6.0",
  "pydantic>=2.10.0",
  "clickhouse-connect>=0.8.0",
  "pyarrow>=14.0.0",
  "opentelemetry-sdk>=1.27.0,<2",
  "opentelemetry-instrumentation-fastapi>=0.48b0",
  "opentelemetry-instrumentation-redis>=0.48b0",
  "opentelemetry-exporter-otlp>=1.27.0,<2",
]

[project.optional-dependencies]
s3 = [
  "boto3>=1.34.0",
]
viz = [
  "tarka @ file:../../crates/tarka-py",
]
dev = [
  "ruff>=0.8.0",
  "pytest>=8.0",
  "pytest-asyncio>=0.24.0",
  "pytest-mock>=3.14.0",
  "pytest-cov>=5.0",
  "httpx>=0.28.0",
  "pyyaml>=6.0",
  "openapi-spec-validator>=0.7.0",
  "schemathesis>=4.17.0",
  "hypothesis>=6.124.0",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
decision_api = ["data/*.json"]

[tool.ruff.lint.per-file-ignores]
"src/decision_api/feature_store_api.py" = ["B008"]
"src/decision_api/analytics_dashboards.py" = ["B008"]
"src/decision_api/backtest_api.py" = ["B008"]
"src/decision_api/rule_compiler_api.py" = ["B008"]
"src/decision_api/ml_export_api.py" = ["B008"]
"src/decision_api/manifest_visualize_api.py" = ["B008"]
"src/decision_api/manifest_compare_api.py" = ["B008"]
"src/decision_api/rule_gitops_api.py" = ["B008"]
