site_name: "Tarka Documentation"
site_description: "Modular, open-source fraud detection platform with real-time scoring, graph analytics, ML inference, and case management."
site_url: https://tarka.dev

repo_name: tarka/tarka
repo_url: https://github.com/tarka/tarka

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - def_list
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Architecture: architecture.md
  - Services:
      - Decision API: services/decision-api.md
      - Graph Service: services/graph-service.md
      - Case API: services/case-api.md
      - Feature Service: services/feature-service.md
      - ML Scoring: services/ml-scoring.md
      - Investigation Agent: services/investigation-agent.md
  - Guides:
      - Rule Authoring: guides/rules.md
      - Graph Analysis: guides/graph-analysis.md
      - Deployment: guides/deployment.md
      - "Deployment: AWS": guides/deployment-aws.md
      - "Deployment: Azure": guides/deployment-azure.md
      - "Deployment: GCP": guides/deployment-gcp.md
      - "Deployment: Cloud-native bundles": guides/deployment-cloud-native-bundles.md
      - "Deployment: Presets & generated values": guides/deployment-presets.md
      - "Deployment: Managed services": guides/deployment-managed-services.md
      - "Deployment: Lighter runtime": guides/deployment-lighter-runtime.md
      - "Deployment: Release readiness": guides/deployment-release-readiness.md
      - Enterprise Readiness: guides/enterprise-readiness.md
      - "Enterprise Copilot: plugin + governance": guides/enterprise-copilot-plugin-and-governance-controls.md
      - Incident Response: guides/incident-response.md
      - "Chaos runbook (template)": guides/runbook-chaos-template.md
      - 30/60/90 Roadmap: guides/roadmap-30-60-90.md
      - Release Calendar (May 2026): guides/release-calendar-2026-05.md
      - OSS ship order (dependencies): guides/oss-ship-order-dependencies.md
      - Ingest, idempotency & replay: guides/ingest-replay-onboarding.md
      - GitHub Issues Batch (Reassessment Wave 2): guides/github-issues-batch-2026-04-reassessment-wave2.md
      - Module codenames: guides/module-codenames.md
      - "Collaboration chat (Slack, Teams, Lark) & cloud": guides/investigation-collaboration-chat-aws-azure.md
      - "Agentic AI fraud detection (variables & layering)": guides/agentic-ai-fraud-detection-variables-and-layering.md
      - Saarthi Pro:
          - vs open source (OSS): guides/saarthi-pro-vs-oss.md
          - Roadmap: guides/saarthi-pro-roadmap.md
          - Distribution & contract parity: guides/saarthi-pro-distribution-and-contract-parity.md
          - Adapter catalog & certification: guides/saarthi-pro-adapter-catalog-and-certification.md
  - Projects:
      - Module Projects Overview: projects/README.md
      - Decision API Project: projects/decision-api-project.md
      - Case API Project: projects/case-api-project.md
      - Graph Service Project: projects/graph-service-project.md
      - ML Scoring Project: projects/ml-scoring-project.md
      - Feature Service Project: projects/feature-service-project.md
      - Integration Ingress Project: projects/integration-ingress-project.md
      - Frontend Project: projects/frontend-project.md
      - Python SDK Project: projects/sdk-python-project.md
      - TypeScript SDK Project: projects/sdk-typescript-project.md
      - Mobile SDKs Project: projects/sdk-mobile-project.md
      - Analytics Sink Project: projects/analytics-sink-project.md
      - Investigation Agent Project: projects/investigation-agent-project.md
  - Releases:
      - v1.1.0 (Planned): releases/v1.1.0-2026-04-30.md
